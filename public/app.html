<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iTECify IDE</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: Segoe UI, Roboto, Arial, sans-serif; background:#1e1e1e; color:#ddd; min-height:100vh; }
      .container { display:grid; grid-template-rows:auto 1fr; height:100vh; }
      .top { background:#252526; border-bottom:1px solid #333; padding:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
      .top h1 { margin:0; font-size:16px; color:#fff; }
      .top .controls { display:inline-flex; gap:8px; flex-wrap:wrap; }
      .top button, .top select, .top input { background:#2a2a2f; border:1px solid #444; color:#eee; border-radius:4px; padding:5px 8px; font-size:13px; cursor:pointer; }
      .top button:hover, .top select:hover { background:#353540; }
      .main { display:grid; grid-template-columns:220px 1fr; min-height:0; }
      .sidebar { background:#20202a; border-right:1px solid #333; display:flex; flex-direction:column; min-height:0; }
      .panel-title { font-size:11px; color:#a0a7b0; text-transform:uppercase; padding:8px; border-bottom:1px solid #333; margin:0; }
      .file-list, .agent-list { overflow:auto; padding:6px; flex:1; }
      .file-item, .agent-item { background:#2b2c33; color:#e1e1e1; margin-bottom:6px; border-radius:4px; border:1px solid #3c3d46; padding:6px 8px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-size:13px; }
      .file-item span, .agent-item span { flex:1; }
      .file-item button, .agent-item button { background:#3a3a40; border:1px solid #555; color:#ccc; border-radius:3px; padding:2px 6px; font-size:11px; cursor:pointer; }
      .file-item button:hover, .agent-item button:hover { background:#454550; }
      .file-item.active, .agent-item.active { border-color:#5f9cff; background:#32354e; }
      .agent-panel { background:#252536; border:1px solid #444; border-radius:6px; margin:8px 6px 0px 6px; padding:8px; }
      .agent-panel.hidden { display:none; }
      .agent-panel h3 { margin:0 0 8px 0; font-size:12px; color:#fff; }
      .agent-panel textarea { width:100%; height:70px; margin-bottom:6px; background:#1f2132; border:1px solid #444; color:#eee; padding:6px; font-family:Consolas, Monaco, monospace; font-size:12px; }
      .agent-panel .agent-suggestions { background:#1b1c28; border:1px solid #444; border-radius:4px; padding:6px; color:#c8d0e0; font-size:12px; height:110px; overflow:auto; white-space:pre-wrap; }
      .agent-panel .agent-buttons { display:flex; gap:6px; margin-top:8px; }
      .agent-panel .agent-buttons button { flex:1; background:#2a2a3a; border:1px solid #444; color:#eee; border-radius:4px; padding:6px; font-size:12px; cursor:pointer; }
      .editor-wrap { display:flex; flex-direction:column; min-height:0; }
      .tabbar { background:#1f1f24; display:flex; border-bottom:1px solid #333; }
      .tab { cursor:pointer; color:#ccc; padding:8px 10px; font-size:13px; border-right:1px solid #2f2f3b; }
      .tab:hover { background:#2a2a33; }
      .tab.active { background:#2c2f45; color:#fff; border-bottom:3px solid #5f9cff; }
      #codeEditor { flex:1; width:100%; height:100%; border:none; outline:none; background:#11131a; color:#e8ebff; padding:12px; resize:none; font-family:Consolas, Monaco, monospace; font-size:13px; line-height:1.45; }
      .status { background:#16171f; border-top:1px solid #333; color:#9da5b8; padding:6px 10px; display:flex; justify-content:space-between; font-size:12px; }
      .output { background:#101118; color:#c8d0e0; border-top:1px solid #333; padding:10px; font-family:Consolas, Monaco, monospace; font-size:12px; overflow:auto; height:170px; white-space:pre-wrap; }
      .hidden { display:none; }
      .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; }
      .modal { background:#1e1e1e; border:1px solid #444; border-radius:8px; padding:20px; width:90%; max-width:600px; max-height:80vh; overflow:auto; }
      .modal h2 { margin-top:0; color:#fff; }
      .modal-prompt { margin:12px 0; }
      .modal-prompt label { display:block; margin-bottom:6px; font-size:13px; color:#a0a7b0; }
      .modal-prompt textarea { width:100%; height:80px; background:#2a2a2f; border:1px solid #444; border-radius:4px; color:#eee; padding:8px; font-family:Consolas, Monaco, monospace; font-size:12px; resize:vertical; }
      .modal-suggestions { background:#2a2a2f; border:1px solid #444; border-radius:4px; padding:10px; margin:12px 0; max-height:250px; overflow:auto; color:#c8d0e0; font-size:12px; white-space:pre-wrap; }
      .modal-buttons { display:flex; gap:8px; margin-top:16px; }
      .modal-buttons button { flex:1; background:#2a2a2f; border:1px solid #444; color:#eee; border-radius:4px; padding:8px; cursor:pointer; }
      .modal-buttons button:hover { background:#353540; }
      .file-item input { background:#3a3a45; border:1px solid #5f9cff; color:#eee; padding:4px; font-size:13px; flex:1; border-radius:3px; }
      .file-item input:focus { outline:none; border-color:#7fb3ff; box-shadow:0 0 0 2px rgba(95,156,255,0.2); }
      .file-item input.error { border-color:#ff6b6b; animation:shake 0.2s ease; }
      .file-new-hint { font-size:10px; color:#7a8090; padding:2px 8px 6px 8px; }
      .file-new-hint.err { color:#ff7f7f; }
      @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <h1>iTECify IDE</h1>
        <div class="controls">
          <button id="newFileBtn">New File</button>
          <button id="importFileBtn">Import</button>
          <input id="fileUpload" type="file" class="hidden" />
          <button id="saveFileBtn">Save</button>
          <button id="downloadFileBtn">Download</button>
          <button id="runActiveBtn">Run Active</button>
          <button id="runAllBtn">Run All</button>
          <button id="undoBtn">Undo</button>
          <button id="redoBtn">Redo</button>
        </div>
      </div>
      <div class="main">
        <aside class="sidebar">
          <div class="panel-title">Files</div>
          <div class="file-list" id="fileList"></div>
          <div class="panel-title">AI Agents</div>
          <div class="agent-list" id="agentList"></div>
          <div id="agentPanel" class="agent-panel hidden">
            <h3 id="agentPanelTitle">AI Agent</h3>
            <textarea id="agentPanelPrompt" placeholder="Ask the AI about this code"></textarea>
            <div id="agentPanelSuggestions" class="agent-suggestions">Type a prompt and click Get Suggestions.</div>
            <div class="agent-buttons">
              <button id="agentPanelSubmitBtn">Get Suggestions</button>
              <button id="agentPanelHideBtn">Hide</button>
            </div>
            <div style="margin-top:6px;">
              <button id="agentSetKeyBtn" style="width:100%;background:#1a2a1a;border:1px solid #3a6a3a;color:#8fcf8f;border-radius:4px;padding:5px;font-size:11px;cursor:pointer;">🔑 Set OpenAI API Key</button>
            </div>
            <div id="agentKeyStatus" style="font-size:10px;color:#7a8090;padding:3px 0 0 0;"></div>
          </div>
        </aside>
        <section class="editor-wrap">
          <div class="tabbar" id="tabBar"></div>
          <textarea id="codeEditor" spellcheck="false"></textarea>
          <div class="status"><span id="statusFile">No file selected</span><span id="cursorPos">Ln 1, Col 1</span></div>
          <div class="output" id="runOutput">Output will appear here.</div>
        </section>
      </div>
    </div>

    <script>
      const STORAGE_KEY = 'itecify-ide-state-v2';
      const DEFAULT_FILES = [
        { id:'file-js', name:'main.js', language:'nodejs', code:'// Hello from JavaScript\nconsole.log("Hello, World!");\n' },
        { id:'file-py', name:'main.py', language:'python', code:'# Hello from Python\nprint("Hello, World!")\n' },
        { id:'file-html', name:'index.html', language:'html', code:'<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Hello</title></head><body><h1>Hello, World!</h1></body></html>' }
      ];
      const TEMPLATES = {
        nodejs:'// Hello from JavaScript\nconsole.log("Hello, World!");\n',
        python:'# Hello from Python\nprint("Hello, World!")\n',
        rust:'// Hello from Rust\nfn main() {\n  println!("Hello, World!");\n}\n',
        c:'#include <stdio.h>\n// Hello from C\nint main() { printf("Hello, World!\\n"); return 0; }\n',
        cpp:'#include <iostream>\n// Hello from C++\nint main() { std::cout << "Hello, World!\\n"; return 0; }\n',
        csharp:'using System;\n// Hello from C#\nclass Program { static void Main() { Console.WriteLine("Hello, World!"); } }\n',
        html:'<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Hello</title></head><body><h1>Hello, World!</h1></body></html>',
        css:'/* Hello from CSS */\nbody { background: #1e1e1e; color: #ddd; font-family: Arial, sans-serif; }\n'
      };

      const fileUpload = document.getElementById('fileUpload');
      const fileListEl = document.getElementById('fileList');
      const tabBarEl = document.getElementById('tabBar');
      const codeEditor = document.getElementById('codeEditor');
      const statusFile = document.getElementById('statusFile');
      const cursorPos = document.getElementById('cursorPos');
      const runOutput = document.getElementById('runOutput');
      const agentListEl = document.getElementById('agentList');
      const agentPanel = document.getElementById('agentPanel');
      const agentPanelTitle = document.getElementById('agentPanelTitle');
      const agentPanelPrompt = document.getElementById('agentPanelPrompt');
      const agentPanelSuggestions = document.getElementById('agentPanelSuggestions');
      const agentPanelSubmitBtn = document.getElementById('agentPanelSubmitBtn');
      const agentPanelHideBtn = document.getElementById('agentPanelHideBtn');

      function getLanguageFromExtension(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const extMap = { 'js':'nodejs', 'mjs':'nodejs', 'jsx':'nodejs', 'py':'python', 'rs':'rust', 'c':'c', 'cpp':'cpp', 'cc':'cpp', 'cxx':'cpp', 'cs':'csharp', 'html':'html', 'htm':'html', 'css':'css' };
        return extMap[ext] || 'nodejs';
      }

      let state = { files: [], activeId: null, agents: [{id:'agent-code', name:'Code Assistant'}] };
      let history = {};
      let isUndoRedo = false;
      let currentAgentId = null;
      let undoDebounceTimer = null;

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) state = JSON.parse(raw);
        } catch (e) {
          console.warn('load state failed', e);
        }
        if (!Array.isArray(state.files) || !state.files.length) {
          state.files = DEFAULT_FILES.map(f => ({...f}));
          state.activeId = state.files[0].id;
        }
        if (!Array.isArray(state.agents) || !state.agents.length) {
          state.agents = [{id:'agent-code', name:'Code Assistant'}];
        }
        if (!state.activeId && state.files.length) state.activeId = state.files[0].id;
        state.files.forEach((file) => { if (!history[file.id]) history[file.id] = {undo:[],redo:[]}; });
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function renderFiles() {
        fileListEl.innerHTML = '';
        tabBarEl.innerHTML = '';
        state.files.forEach(file => {
          const row = document.createElement('div');
          row.className = 'file-item' + (file.id === state.activeId ? ' active' : '');
          if (file.id === 'temp-new') {
            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'new-file-input';
            input.placeholder = 'e.g. index.html, main.py, app.js';
            input.value = file.name; // restore previously typed value from state
            input.autocomplete = 'off';
            input.spellcheck = false;
            row.appendChild(input);
            fileListEl.appendChild(row);

            // Hint line beneath the input
            const hint = document.createElement('div');
            hint.className = 'file-new-hint';
            hint.textContent = 'Extensions: .html .css .js .py .c .cpp .cs .rs';
            fileListEl.appendChild(hint);

            let confirmed = false;

            const showError = (msg) => {
              hint.textContent = msg;
              hint.className = 'file-new-hint err';
              input.classList.add('error');
              setTimeout(() => input.classList.remove('error'), 250);
              input.focus();
            };

            const tryConfirm = (valueOverride) => {
              if (confirmed) return;
              // Use override (from state) or live input value
              const val = (valueOverride !== undefined ? valueOverride : input.value).trim();
              if (!val) {
                confirmed = true;
                state.files = state.files.filter(f => f.id !== 'temp-new');
                renderFiles();
                return;
              }
              const ext = val.split('.').pop().toLowerCase();
              const supported = ['js','mjs','jsx','py','rs','c','cpp','cc','cxx','cs','html','htm','css'];
              if (!ext || ext === val) {
                showError('⚠ Add an extension: .html .js .py .cpp .c .cs .rs .css');
                return;
              }
              if (!supported.includes(ext)) {
                showError(`⚠ Unsupported extension ".${ext}" — use .html .js .py .cpp …`);
                return;
              }
              confirmed = true;
              confirmNewFile(val);
            };

            // Persist typed value into state on every keystroke so renderFiles() rebuilds correctly
            input.oninput = () => {
              const tempEntry = state.files.find(f => f.id === 'temp-new');
              if (tempEntry) tempEntry.name = input.value;
            };

            input.onkeydown = (e) => {
              if (e.key === 'Enter') { e.preventDefault(); tryConfirm(); }
              if (e.key === 'Escape') {
                confirmed = true;
                state.files = state.files.filter(f => f.id !== 'temp-new');
                renderFiles();
              }
            };

            // On blur: read value from state (in case DOM was rebuilt before blur fired)
            input.onblur = () => {
              const tempEntry = state.files.find(f => f.id === 'temp-new');
              const savedVal = tempEntry ? tempEntry.name : input.value;
              tryConfirm(savedVal);
            };

            // Auto-focus after render is complete
            requestAnimationFrame(() => { const el = document.getElementById('new-file-input'); if (el) el.focus(); });
            tabBarEl; // no tab for temp-new
          } else {
            const label = document.createElement('span');
            label.textContent = file.name;
            row.appendChild(label);
            row.onclick = () => selectFile(file.id);

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'X';
            deleteBtn.onclick = (e) => { e.stopPropagation(); deleteFile(file.id); };
            row.appendChild(deleteBtn);
            fileListEl.appendChild(row);

            const tab = document.createElement('div');
            tab.className = 'tab' + (file.id === state.activeId ? ' active' : '');
            tab.textContent = file.name;
            tab.onclick = () => selectFile(file.id);
            tabBarEl.appendChild(tab);
          }
        });
      }

      function renderAgents() {
        agentListEl.innerHTML = '';
        state.agents.forEach(agent => {
          const row = document.createElement('div');
          row.className = 'agent-item';
          const label = document.createElement('span');
          label.textContent = agent.name;
          row.appendChild(label);

          const openBtn = document.createElement('button');
          openBtn.textContent = 'Open';
          openBtn.onclick = (e) => {
            e.stopPropagation();
            showAgentPanel(agent);
          };
          row.appendChild(openBtn);
          agentListEl.appendChild(row);
        });
      }

      function showAgentPanel(agent) {
        if (!agent) return;
        currentAgentId = agent.id;
        agentPanelTitle.textContent = 'AI Agent: ' + agent.name;
        agentPanelPrompt.value = '';
        agentPanelSuggestions.textContent = 'Type a prompt and click Get Suggestions.';
        agentPanel.classList.remove('hidden');
      }

      function hideAgentPanel() {
        agentPanel.classList.add('hidden');
      }

      function getActiveFile() { return state.files.find(f => f.id === state.activeId); }

      function selectFile(fileId) {
        const file = state.files.find(f => f.id === fileId);
        if (!file) return;
        flushCurrentFile();
        state.activeId = file.id;
        codeEditor.value = file.code;
        statusFile.textContent = file.name + ' [' + file.language + ']';
        renderFiles();
        updateCursor();
        saveState();
      }

      function flushCurrentFile() {
        const file = getActiveFile();
        if (!file) return;
        if (file.code !== codeEditor.value) {
          history[file.id].undo.push(file.code);
          history[file.id].redo = [];
          file.code = codeEditor.value;
        }
      }

      function createFile(name, language, initialCode) {
        const id = 'file-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        const file = { id, name, language, code: initialCode };
        state.files.push(file);
        if (!history[id]) history[id] = {undo: [], redo: []};
        selectFile(id);
        saveState();
      }

      function deleteFile(id) {
        if (state.files.length <= 1) { alert('Keep at least one file.'); return; }
        state.files = state.files.filter(f => f.id !== id);
        delete history[id];
        if (state.activeId === id) state.activeId = state.files[0].id;
        saveState();
        renderFiles();
        selectFile(state.activeId);
      }

      function undo() {
        const file = getActiveFile();
        if (!file || !history[file.id] || !history[file.id].undo.length) return;
        history[file.id].redo.push(file.code);
        file.code = history[file.id].undo.pop();
        isUndoRedo = true;
        codeEditor.value = file.code;
        isUndoRedo = false;
        saveState();
      }

      function redo() {
        const file = getActiveFile();
        if (!file || !history[file.id] || !history[file.id].redo.length) return;
        history[file.id].undo.push(file.code);
        file.code = history[file.id].redo.pop();
        isUndoRedo = true;
        codeEditor.value = file.code;
        isUndoRedo = false;
        saveState();
      }

      function updateCursor() {
        const pos = codeEditor.selectionStart;
        const lines = codeEditor.value.slice(0, pos).split('\n');
        cursorPos.textContent = 'Ln ' + lines.length + ', Col ' + (lines[lines.length - 1].length + 1);
      }



      // runFile: returns a string result and optionally sets runOutput.
      // When called from runAll, setOutput=false so the caller controls the display.
      async function runFile(file, setOutput = true) {
        if (!file) {
          if (setOutput) runOutput.textContent = 'No file selected.';
          return 'No file selected.';
        }

        if (file.language === 'html') {
          if (setOutput) {
            runOutput.innerHTML = '';
            const iframe = document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '300px';
            iframe.style.border = '1px solid #444';
            iframe.srcdoc = file.code;
            runOutput.appendChild(iframe);
          }
          return '[HTML rendered in iframe]';
        }

        if (file.language === 'css') {
          let styleEl = document.getElementById('itecify-runtime-style');
          if (!styleEl) {
            styleEl = document.createElement('style');
            styleEl.id = 'itecify-runtime-style';
            document.head.appendChild(styleEl);
          }
          styleEl.textContent = file.code;
          const msg = 'CSS applied to the UI.';
          if (setOutput) runOutput.textContent = msg;
          return msg;
        }

        if (file.language === 'nodejs') {
          let capture = '';
          const originalLog = console.log;
          const originalError = console.error;
          console.log = (...args) => { capture += args.map(x => String(x)).join(' ') + '\n'; };
          console.error = (...args) => { capture += args.map(x => String(x)).join(' ') + '\n'; };
          let result;
          try {
            new Function(file.code)();
            result = capture || 'JavaScript executed successfully (no output).';
          } catch (err) {
            result = 'JavaScript error: ' + err;
          } finally {
            console.log = originalLog;
            console.error = originalError;
          }
          if (setOutput) runOutput.textContent = result;
          return result;
        }

        try {
          const res = await fetch('/api/sandbox/run', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ language:file.language, code:file.code })
          });

          if (!res.ok) {
            const text = await res.text();
            const msg = 'Run failed: ' + res.status + '\n' + text;
            if (setOutput) runOutput.textContent = msg;
            return msg;
          }

          const data = await res.json();
          const msg = 'exit=' + data.code + '\nstdout:\n' + (data.stdout||'') + '\nstderr:\n' + (data.stderr||'');
          if (setOutput) runOutput.textContent = msg;
          return msg;
        } catch (err) {
          const msg = 'Run error: ' + err.message;
          if (setOutput) runOutput.textContent = msg;
          return msg;
        }
      }

      async function runActive() {
        const file = getActiveFile();
        if (!file) {
          runOutput.textContent = 'No file selected.';
          return;
        }
        flushCurrentFile();
        await runFile(file);
      }

      async function runAll() {
        flushCurrentFile();
        let fullOutput = 'Running all files...\n';
        runOutput.textContent = fullOutput;

        for (const file of state.files) {
          fullOutput += '\n=== ' + file.name + ' (' + file.language + ') ===\n';
          runOutput.textContent = fullOutput;

          // Pass setOutput=false so runFile doesn't clobber our accumulated log
          const fileResult = await runFile(file, false);
          fullOutput += (fileResult || '') + '\n';
          runOutput.textContent = fullOutput;
          await new Promise(resolve => setTimeout(resolve, 50));
        }

        fullOutput += '\nAll files processed.';
        runOutput.textContent = fullOutput;
      }

      const sendAIPrompt = async (promptText, suggestionsEl) => {
        const prompt = promptText.trim();
        if (!prompt) {
          suggestionsEl.textContent = 'Please enter a prompt first.';
          return;
        }
        suggestionsEl.textContent = 'Thinking...';
        runOutput.textContent = 'AI is processing your prompt...';
        try {
          const headers = { 'Content-Type': 'application/json' };
          // Attach browser-stored key as a header if present
          const localKey = localStorage.getItem('itecify-openai-key');
          if (localKey) headers['x-openai-key'] = localKey;

          const res = await fetch('/api/ai', {
            method: 'POST',
            headers,
            body: JSON.stringify({ prompt })
          });
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(res.status + ' ' + txt);
          }
          const data = await res.json();
          const text = data.response || '[No response]';
          suggestionsEl.textContent = text;
          runOutput.textContent = 'AI response received.';
        } catch (err) {
          suggestionsEl.textContent = 'AI error: ' + (err.message || err);
          runOutput.textContent = 'AI error: ' + (err.message || err);
        }
      };

      agentPanelSubmitBtn.onclick = () => sendAIPrompt(agentPanelPrompt.value, agentPanelSuggestions);
      agentPanelHideBtn.onclick = hideAgentPanel;

      // In-browser API key management
      const agentSetKeyBtn = document.getElementById('agentSetKeyBtn');
      const agentKeyStatus = document.getElementById('agentKeyStatus');
      function refreshKeyStatus() {
        const k = localStorage.getItem('itecify-openai-key');
        agentKeyStatus.textContent = k ? '✓ API key saved (local)' : 'No key saved — AI will use server env var';
        agentKeyStatus.style.color = k ? '#8fcf8f' : '#7a8090';
      }
      agentSetKeyBtn.onclick = () => {
        const existing = localStorage.getItem('itecify-openai-key') || '';
        const key = window.prompt('Paste your OpenAI API key (sk-...):\nThis is stored only in your browser localStorage.', existing);
        if (key === null) return; // cancelled
        if (!key.trim()) {
          localStorage.removeItem('itecify-openai-key');
        } else {
          localStorage.setItem('itecify-openai-key', key.trim());
        }
        refreshKeyStatus();
      };
      refreshKeyStatus();

      function confirmNewFile(name) {
        if (!name || !name.trim()) {
          state.files = state.files.filter(f => f.id !== 'temp-new');
          renderFiles();
          return;
        }
        const trimmed = name.trim();
        const lang = getLanguageFromExtension(trimmed);
        const template = TEMPLATES[lang] || '';
        state.files = state.files.filter(f => f.id !== 'temp-new');
        createFile(trimmed, lang, template);
      }

      // Button handlers
      document.getElementById('newFileBtn').onclick = () => {
        // If a temp-new entry already exists, just focus it
        if (state.files.find(f => f.id === 'temp-new')) {
          const el = document.getElementById('new-file-input');
          if (el) el.focus();
          return;
        }
        state.files.push({ id: 'temp-new', name: '', language: 'nodejs', code: '' });
        renderFiles();
      };

      document.getElementById('importFileBtn').onclick = () => fileUpload.click();

      document.getElementById('saveFileBtn').onclick = () => {
        flushCurrentFile();
        saveState();
        runOutput.textContent = 'Saved';
      };

      document.getElementById('downloadFileBtn').onclick = () => {
        const file = getActiveFile();
        if (!file) return;
        const blob = new Blob([file.code], { type:'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        const objectUrl = URL.createObjectURL(blob);
        a.href = objectUrl;
        a.download = file.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        // Revoke the object URL to free memory
        setTimeout(() => URL.revokeObjectURL(objectUrl), 100);
      };

      document.getElementById('runActiveBtn').onclick = runActive;
      document.getElementById('runAllBtn').onclick = runAll;
      document.getElementById('undoBtn').onclick = undo;
      document.getElementById('redoBtn').onclick = redo;

      codeEditor.addEventListener('input', () => {
        if (!state.activeId) return;
        const file = getActiveFile();
        if (!file) return;
        const previousCode = file.code;
        file.code = codeEditor.value;
        if (!isUndoRedo) {
          // Debounce undo history pushes to avoid one entry per keystroke
          clearTimeout(undoDebounceTimer);
          undoDebounceTimer = setTimeout(() => {
            if (previousCode !== file.code) {
              history[file.id].undo.push(previousCode);
              history[file.id].redo = [];
            }
          }, 500);
        }
        saveState();
      });

      codeEditor.addEventListener('keydown', (e) => {
        if (e.ctrlKey && (e.key === 's' || e.key === 'S')) {
          e.preventDefault();
          flushCurrentFile();
          saveState();
          runOutput.textContent = 'Saved';
        }
        if (e.ctrlKey && e.key.toLowerCase() === 'z') {
          e.preventDefault();
          undo();
        }
        if (e.ctrlKey && e.key.toLowerCase() === 'y') {
          e.preventDefault();
          redo();
        }
      });

      codeEditor.addEventListener('click', updateCursor);
      codeEditor.addEventListener('keyup', updateCursor);

      fileUpload.addEventListener('change', (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const lang = getLanguageFromExtension(file.name);
          createFile(file.name, lang, String(reader.result || ''));
          event.target.value = '';
        };
        reader.readAsText(file);
      });

      // Initialize app
      loadState();
      renderFiles();
      renderAgents();
      if (state.activeId) selectFile(state.activeId);
    </script>
  </body>
</html>
