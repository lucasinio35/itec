<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iTECify IDE</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: rgba(15, 23, 39, 0.82);
      --panel-strong: rgba(15, 23, 39, 0.94);
      --panel-soft: rgba(255, 255, 255, 0.04);
      --line: rgba(136, 166, 214, 0.22);
      --text: #eef4ff;
      --muted: #9eb0cc;
      --accent: #64b5ff;
      --accent-2: #8bffcf;
      --danger: #ff8f8f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(100, 181, 255, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(139, 255, 207, 0.12), transparent 24%),
        linear-gradient(160deg, #09101c 0%, #10192a 45%, #08111a 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.25));
      pointer-events: none;
    }

    .container {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top {
      background: rgba(10, 17, 30, 0.72);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow: visible;
      position: relative;
      z-index: 30;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .top h1 {
      margin: 0;
      font-size: 16px;
      color: #fff;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .top .account-btn {
      background: linear-gradient(135deg, var(--accent), #2d76ff);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 12px 24px rgba(59, 129, 255, 0.24);
    }

    .top .controls {
      display: inline-flex;
      gap: 8px;
      flex-wrap: nowrap;
      align-items: center;
      min-width: 0;
    }

    .top button,
    .top select,
    .top input {
      background: var(--panel-soft);
      border: 1px solid rgba(142, 176, 221, 0.18);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .top button:hover,
    .top select:hover {
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(142, 176, 221, 0.3);
      transform: translateY(-1px);
    }

    .top .dropdown {
      position: relative;
      margin-left: auto;
      flex-shrink: 0;
    }

    .top .dropdown-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      min-width: 92px;
      justify-content: center;
    }

    .top .dropdown-arrow {
      font-size: 10px;
    }

    .top .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: var(--panel-strong);
      backdrop-filter: blur(18px);
      border: 1px solid var(--line);
      border-radius: 16px;
      min-width: 180px;
      z-index: 2000;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
      overflow: hidden;
    }

    .top .dropdown-content.show {
      display: block;
    }

    .top .dropdown-toggle.open .dropdown-arrow {
      transform: rotate(180deg);
    }

    .top .dropdown-content button {
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      border-radius: 0;
      padding: 10px 14px;
      background: transparent;
      transform: none;
    }

    .top .dropdown-content button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .main {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 0;
    }

    .sidebar {
      background: rgba(9, 15, 28, 0.74);
      backdrop-filter: blur(16px);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.02);
    }

    .panel-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 10px 10px 8px;
      border-bottom: 1px solid rgba(136, 166, 214, 0.14);
      margin: 0;
    }

    .file-list,
    .agent-list {
      overflow: auto;
      padding: 6px;
      flex: 1;
    }

    .file-item,
    .agent-item {
      background: rgba(255, 255, 255, 0.05);
      color: #e8eefc;
      margin-bottom: 8px;
      border-radius: 12px;
      border: 1px solid rgba(136, 166, 214, 0.14);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 13px;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .file-item span,
    .agent-item span {
      flex: 1;
    }

    .file-item:hover,
    .agent-item:hover {
      transform: translateY(-1px);
      border-color: rgba(100, 181, 255, 0.38);
      background: rgba(255, 255, 255, 0.08);
    }

    .file-item button,
    .agent-item button {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(136, 166, 214, 0.18);
      color: #d7e5ff;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
    }

    .file-item button:hover,
    .agent-item button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .file-item.active,
    .agent-item.active {
      border-color: rgba(100, 181, 255, 0.45);
      background: linear-gradient(135deg, rgba(100, 181, 255, 0.18), rgba(139, 255, 207, 0.08));
      box-shadow: 0 8px 24px rgba(26, 70, 138, 0.2);
    }

    .agent-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      margin: 8px 8px 0 8px;
      padding: 10px;
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.24);
    }

    .agent-panel.hidden {
      display: none;
    }

    .agent-panel h3 {
      margin: 0 0 8px 0;
      font-size: 12px;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .agent-panel textarea {
      width: 100%;
      height: 70px;
      margin-bottom: 6px;
      background: rgba(4, 8, 16, 0.72);
      border: 1px solid rgba(136, 166, 214, 0.18);
      color: #eee;
      padding: 8px;
      font-family: Consolas, Monaco, monospace;
      font-size: 12px;
      border-radius: 12px;
    }

    .agent-panel .agent-suggestions {
      background: rgba(4, 8, 16, 0.82);
      border: 1px solid rgba(136, 166, 214, 0.16);
      border-radius: 12px;
      padding: 8px;
      color: #c8d0e0;
      font-size: 12px;
      height: 110px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .agent-panel .agent-buttons {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .agent-panel .agent-buttons button {
      flex: 1;
      background: linear-gradient(135deg, var(--accent), #2d76ff);
      border: 1px solid transparent;
      color: #fff;
      border-radius: 14px;
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(59, 129, 255, 0.22);
    }

    .editor-wrap {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .tabbar {
      background: rgba(10, 17, 30, 0.6);
      display: flex;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .tab {
      cursor: pointer;
      color: #c9d8f0;
      padding: 10px 14px;
      font-size: 13px;
      border-right: 1px solid rgba(136, 166, 214, 0.12);
      transition: background 0.16s ease, color 0.16s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-label {
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab-close {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: #d8e7ff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
    }

    .tab-close:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(100, 181, 255, 0.14), rgba(139, 255, 207, 0.08));
      color: #fff;
      border-bottom: 3px solid var(--accent);
    }

    .editor-host {
      flex: 1;
      position: relative;
      min-height: 0;
      background: rgba(5, 10, 20, 0.72);
    }

    #codeEditor,
    #fallbackEditor {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #codeEditor {
      min-height: 0;
      background: transparent;
    }

    #fallbackEditor {
      display: none;
      resize: none;
      border: none;
      outline: none;
      padding: 14px;
      background: rgba(5, 10, 20, 0.88);
      color: #e7edf9;
      font: 13px/1.5 Consolas, Monaco, monospace;
      tab-size: 2;
    }

    .status {
      background: rgba(10, 17, 30, 0.84);
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding: 7px 12px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      backdrop-filter: blur(12px);
    }

    .output {
      background: rgba(4, 8, 16, 0.86);
      color: #c8d0e0;
      border-top: 1px solid var(--line);
      padding: 12px;
      font-family: Consolas, Monaco, monospace;
      font-size: 12px;
      overflow: auto;
      height: 170px;
      white-space: pre-wrap;
    }

    .output.error-output {
      color: var(--danger);
    }

    .monaco-editor .error-line-highlight {
      background: rgba(255, 82, 82, 0.14);
    }

    .hidden {
      display: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow: auto;
      backdrop-filter: blur(16px);
    }

    .modal h2 {
      margin-top: 0;
      color: #fff;
    }

    .modal-prompt {
      margin: 12px 0;
    }

    .modal-prompt label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #a0a7b0;
    }

    .modal-prompt textarea {
      width: 100%;
      height: 80px;
      background: rgba(4, 8, 16, 0.78);
      border: 1px solid rgba(136, 166, 214, 0.18);
      border-radius: 12px;
      color: #eee;
      padding: 8px;
      font-family: Consolas, Monaco, monospace;
      font-size: 12px;
      resize: vertical;
    }

    .modal-suggestions {
      background: rgba(4, 8, 16, 0.78);
      border: 1px solid rgba(136, 166, 214, 0.18);
      border-radius: 12px;
      padding: 10px;
      margin: 12px 0;
      max-height: 250px;
      overflow: auto;
      color: #c8d0e0;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .modal-buttons button {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(136, 166, 214, 0.18);
      color: #eee;
      border-radius: 14px;
      padding: 8px;
      cursor: pointer;
    }

    .modal-buttons button:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .file-item input {
      background: rgba(4, 8, 16, 0.8);
      border: 1px solid var(--accent);
      color: #eee;
      padding: 6px 8px;
      font-size: 13px;
      flex: 1;
      border-radius: 10px;
    }

    .file-item input:focus {
      outline: none;
      border-color: #7fb3ff;
      box-shadow: 0 0 0 2px rgba(95, 156, 255, 0.2);
    }

    .file-item input.error {
      border-color: #ff6b6b;
      animation: shake 0.2s ease;
    }

    .file-new-hint {
      font-size: 10px;
      color: #7a8090;
      padding: 2px 8px 6px 8px;
    }

    .file-new-hint.err {
      color: #ff7f7f;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-4px)
      }

      75% {
        transform: translateX(4px)
      }
    }

    .ai-suggestion-line {
      background-color: rgba(100, 200, 100, 0.15) !important;
      border-left: 4px solid rgb(100, 200, 100) !important;
    }

    /* Remote cursor styles */
    .remote-cursor {
      background-color: transparent !important;
      border-radius: 0;
      cursor: pointer;
    }

    .remote-cursor-label {
      font-size: 10px;
      padding: 1px 4px;
      border-radius: 3px;
      margin-left: 2px;
      white-space: nowrap;
      display: inline-block;
      opacity: 0.85;
    }

    .cursor-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      border: 1px solid currentColor;
      vertical-align: middle;
    }
  </style>
  <link rel="stylesheet" data-name="vs/editor/editor.main"
    href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script type="importmap">
    {
      "imports": {
        "yjs": "https://cdn.jsdelivr.net/npm/yjs@13.6.8/+esm",
        "y-websocket": "https://cdn.jsdelivr.net/npm/y-websocket@1.5.4/+esm"
      }
    }
    </script>
</head>

<body>
  <div class="container">
    <div class="top">
      <h1>iTECify IDE</h1>
      <div class="controls">
        <button id="accountBtn" class="account-btn">Account</button>
        <button id="loginBtn">Login</button>
        <select id="workspaceSelect" title="Workspace" style="min-width:150px"></select>
        <button id="newFileBtn">New File</button>
        <button id="importFileBtn">Import</button>
        <input id="fileUpload" type="file" class="hidden" />
        <button id="saveFileBtn">Save</button>
        <button id="saveToPcBtn" title="Save As to PC for auto-syncing">Save to PC</button>
        <button id="runActiveBtn">Run Active</button>
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
      </div>
      <div class="dropdown">
        <button id="menuBtn" class="dropdown-toggle">Menu <span class="dropdown-arrow">▼</span></button>
        <div id="menuDropdown" class="dropdown-content">
          <button id="homepageBtn">Homepage</button>
          <button id="createWorkspaceBtn">Create Workspace</button>
          <button id="addMemberBtn">Add Member</button>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
    <div class="main">
      <aside class="sidebar">
        <div class="panel-title">Files</div>
        <div class="file-list" id="fileList"></div>
        <div class="panel-title">AI Agents</div>
        <div id="agentPanel" class="agent-panel">
          <h3 id="agentPanelTitle">AI Agent</h3>
          <textarea id="agentPanelPrompt" placeholder="Ask the AI about this code"></textarea>
          <div id="agentPanelSuggestions" class="agent-suggestions">Type a prompt and click Get Suggestions.</div>
          <div class="agent-buttons">
            <button id="agentPanelSubmitBtn">Get Suggestions</button>
          </div>
          <div style="margin-top:6px;">
            <button id="agentSetKeyBtn"
              style="width:100%;background:#1a2a1a;border:1px solid #3a6a3a;color:#8fcf8f;border-radius:4px;padding:5px;font-size:11px;cursor:pointer;">🔑
              Set Groq API Key</button>
          </div>
          <div id="agentKeyStatus" style="font-size:10px;color:#7a8090;padding:3px 0 0 0;"></div>
        </div>
      </aside>
      <section class="editor-wrap">
        <div class="tabbar" id="tabBar"></div>
        <div class="editor-host">
          <div id="codeEditor"></div>
          <textarea id="fallbackEditor" spellcheck="false"></textarea>
        </div>
        <div class="status"><span id="statusFile">No file selected</span><span id="cursorPos">Ln 1, Col 1</span></div>
        <div class="status" id="multiCursorStatus">Collaborators: <span id="multiCursorList">None</span></div>
        <div class="output" id="runOutput">Output will appear here.</div>
      </section>
    </div>
  </div>

  <script>
    const STORAGE_KEY_PREFIX = 'itecify-ide-state-v3';
    const DEFAULT_FILES = [
      { id: 'file-js', name: 'main.js', language: 'nodejs', code: '// Hello from JavaScript\nconsole.log("Hello, World!");\n' },
      { id: 'file-py', name: 'main.py', language: 'python', code: '# Hello from Python\nprint("Hello, World!")\n' },
      { id: 'file-html', name: 'index.html', language: 'html', code: '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Hello</title></head><body><h1>Hello, World!</h1></body></html>' }
    ];
    const TEMPLATES = {
      nodejs: '// Hello from JavaScript\nconsole.log("Hello, World!");\n',
      python: '# Hello from Python\nprint("Hello, World!")\n',
      rust: '// Hello from Rust\nfn main() {\n  println!("Hello, World!");\n}\n',
      c: '#include <stdio.h>\n// Hello from C\nint main() { printf("Hello, World!\\n"); return 0; }\n',
      cpp: '#include <iostream>\n// Hello from C++\nint main() { std::cout << "Hello, World!\\n"; return 0; }\n',
      csharp: 'using System;\n// Hello from C#\nclass Program { static void Main() { Console.WriteLine("Hello, World!"); } }\n',
      html: '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Hello</title>\n</head>\n<body>\n  <h1>Hello, World!</h1>\n</body>\n</html>\n',
      css: '/* Hello from CSS */\nbody { background: #1e1e1e; color: #ddd; font-family: Arial, sans-serif; }\n'
    };

    const fileUpload = document.getElementById('fileUpload');
    const fileListEl = document.getElementById('fileList');
    const tabBarEl = document.getElementById('tabBar');
    const codeEditorEl = document.getElementById('codeEditor');
    const fallbackEditorEl = document.getElementById('fallbackEditor');
    const accountBtn = document.getElementById('accountBtn');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const homepageBtn = document.getElementById('homepageBtn');
    const menuBtn = document.getElementById('menuBtn');
    const menuDropdown = document.getElementById('menuDropdown');
    const workspaceSelect = document.getElementById('workspaceSelect');
    const createWorkspaceBtn = document.getElementById('createWorkspaceBtn');
    const addMemberBtn = document.getElementById('addMemberBtn');
    const statusFile = document.getElementById('statusFile');
    const cursorPos = document.getElementById('cursorPos');
    const runOutput = document.getElementById('runOutput');
    const agentPanel = document.getElementById('agentPanel');
    const agentPanelTitle = document.getElementById('agentPanelTitle');
    const agentPanelPrompt = document.getElementById('agentPanelPrompt');
    const agentPanelSuggestions = document.getElementById('agentPanelSuggestions');
    const agentPanelSubmitBtn = document.getElementById('agentPanelSubmitBtn');

    function getLanguageFromExtension(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const extMap = { 'js': 'nodejs', 'mjs': 'nodejs', 'jsx': 'nodejs', 'py': 'python', 'rs': 'rust', 'c': 'c', 'cpp': 'cpp', 'cc': 'cpp', 'cxx': 'cpp', 'cs': 'csharp', 'html': 'html', 'htm': 'html', 'css': 'css' };
      return extMap[ext] || 'nodejs';
    }

    function getStorageKey() {
      return STORAGE_KEY_PREFIX + ':' + (currentWorkspaceId || 'local');
    }

    let state = { files: [], activeId: null, openTabs: [], agents: [{ id: 'agent-code', name: 'Code Assistant' }] };
    let history = {};
    let isUndoRedo = false;
    let currentAgentId = null;
    let undoDebounceTimer = null;
    let authToken = sessionStorage.getItem('itecify-auth-token') || '';
    let currentUser = null;
    let workspaces = [];
    let currentWorkspaceId = sessionStorage.getItem('itecify-workspace-id') || '';
    let monacoEditor = null;
    let monacoModel = null;
    let usingFallbackEditor = false;
    let suppressEditorChange = false;
    let htmlPreviewWindow = null;
    let errorLineDecorations = [];
    let syncRootHandle = null;
    let fileHandles = {}; // { fileId -> FileSystemFileHandle }
    let writeQueue = {};
    const TRACK_KEY = 'itecify-total-time-ms';

    // Collaborative cursor tracking
    let syncWebSocket = null;
    let remoteCursors = {}; // { userId: { username, line, column, color } }
    let remoteDecorations = {}; // { userId: decorationId }
    const CURSOR_COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'];
    let cursorColorIndex = 0;
    let visitStartedAt = Date.now();
    const currentInstanceId = Math.random().toString(36).substring(2, 10);

    function flushTrackedTime() {
      const previous = Number(localStorage.getItem(TRACK_KEY) || '0');
      const delta = Math.max(0, Date.now() - visitStartedAt);
      localStorage.setItem(TRACK_KEY, String(previous + delta));
      visitStartedAt = Date.now();
    }

    function getMonacoLanguage(language) {
      const languageMap = {
        nodejs: 'javascript',
        python: 'python',
        rust: 'rust',
        c: 'c',
        cpp: 'cpp',
        csharp: 'csharp',
        html: 'html',
        css: 'css'
      };
      return languageMap[language] || 'plaintext';
    }

    function getEditorValue() {
      if (monacoEditor) return monacoEditor.getValue();
      if (usingFallbackEditor) return fallbackEditorEl.value;
      return '';
    }

    function setEditorValue(value, language) {
      if (monacoEditor && monacoModel) {
        suppressEditorChange = true;
        monaco.editor.setModelLanguage(monacoModel, getMonacoLanguage(language));
        monacoModel.setValue(value);
        suppressEditorChange = false;
      } else if (usingFallbackEditor) {
        fallbackEditorEl.value = value;
      } else {
        return;
      }
      clearEditorDiagnostics();
      updateCursor();
    }

    function setRunOutputMessage(message, isError = false) {
      runOutput.classList.toggle('error-output', !!isError);
      runOutput.textContent = message;
    }

    async function writeToFileHandle(fileId, handle, content) {
      if (!handle) return;
      if (writeQueue[fileId]) return;
      writeQueue[fileId] = true;
      try {
        const writable = await handle.createWritable();
        await writable.write(content);
        await writable.close();
      } catch (err) {
        console.warn('Failed to write to file handle:', err);
      }
      writeQueue[fileId] = false;
    }

    function clearEditorDiagnostics() {
      if (!window.monaco || !monacoModel || !monacoEditor) return;
      monaco.editor.setModelMarkers(monacoModel, 'runner-errors', []);
      errorLineDecorations = monacoEditor.deltaDecorations(errorLineDecorations, []);
    }

    function parseDiagnostics(stderr) {
      const text = String(stderr || '');
      if (!text.trim()) return [];
      const diagnostics = [];
      const patterns = [
        /:(\d+):(\d+):\s*(?:fatal error|error|warning|note):\s*(.+)/gi,
        /line\s+(\d+)(?:,\s*column\s+(\d+))?.*?(?:error|exception)[:\s-]+(.+)/gi,
        /File\s+"[^"]+",\s+line\s+(\d+).*?\n(?:.+\n)*?([A-Za-z]+Error:\s*.+)/g,
        /<anonymous>:(\d+):(\d+)\)?\s*\n?(?:.+\n)*?([A-Za-z]*Error:\s*.+)/g
      ];

      patterns.forEach((pattern) => {
        let match;
        while ((match = pattern.exec(text))) {
          const lineNumber = Number(match[1] || 1);
          const column = Number(match[2] || 1);
          const message = String(match[3] || match[2] || 'Error').trim();
          if (!Number.isFinite(lineNumber) || lineNumber < 1) continue;
          diagnostics.push({
            lineNumber,
            column: Number.isFinite(column) && column > 0 ? column : 1,
            message
          });
        }
      });

      const seen = new Set();
      return diagnostics.filter((item) => {
        const key = item.lineNumber + ':' + item.column + ':' + item.message;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function showEditorDiagnostics(stderr) {
      if (!window.monaco || !monacoModel || !monacoEditor) return;
      const diagnostics = parseDiagnostics(stderr);
      if (!diagnostics.length) {
        clearEditorDiagnostics();
        return;
      }

      const markers = diagnostics.map((item) => ({
        severity: monaco.MarkerSeverity.Error,
        startLineNumber: item.lineNumber,
        startColumn: item.column,
        endLineNumber: item.lineNumber,
        endColumn: Math.max(item.column + 1, 2),
        message: item.message
      }));

      monaco.editor.setModelMarkers(monacoModel, 'runner-errors', markers);
      errorLineDecorations = monacoEditor.deltaDecorations(
        errorLineDecorations,
        diagnostics.map((item) => ({
          range: new monaco.Range(item.lineNumber, 1, item.lineNumber, 1),
          options: { isWholeLine: true, className: 'error-line-highlight' }
        }))
      );
    }

    function initMonaco() {
      return new Promise((resolve, reject) => {
        if (!window.require) {
          reject(new Error('Monaco loader failed to load.'));
          return;
        }

        window.require.config({
          paths: {
            vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs'
          }
        });

        window.require(['vs/editor/editor.main'], () => {
          monacoModel = monaco.editor.createModel('', 'javascript');
          monacoEditor = monaco.editor.create(codeEditorEl, {
            model: monacoModel,
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 13,
            lineHeight: 20,
            minimap: { enabled: false },
            scrollBeyondLastLine: false,
            wordWrap: 'off',
            tabSize: 2,
            insertSpaces: true
          });

          monacoEditor.onDidChangeModelContent(() => {
            if (suppressEditorChange || !state.activeId) return;
            const file = getActiveFile();
            if (!file) return;
            const previousCode = file.code;
            file.code = getEditorValue();
            if (!isUndoRedo) {
              clearTimeout(undoDebounceTimer);
              undoDebounceTimer = setTimeout(() => {
                if (previousCode !== file.code) {
                  history[file.id].undo.push(previousCode);
                  history[file.id].redo = [];
                }
                // Auto-save to server cache
                if (authToken && currentWorkspaceId) {
                  saveFileToServer(file);
                }
                if (fileHandles[file.id]) {
                  writeToFileHandle(file.id, fileHandles[file.id], file.code);
                }
              }, 400); // 400ms debounce
            }
            saveState();
            broadcastFileUpdate(file); // Instantly notify other instances
            updateCursor();
          });

          monacoEditor.onDidChangeCursorPosition(() => updateCursor());

          monacoEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
            const file = getActiveFile();
            flushCurrentFile();
            saveState();
            if (file && fileHandles[file.id]) {
              writeToFileHandle(file.id, fileHandles[file.id], file.code);
            }
            setRunOutputMessage('Saved');
          });

          resolve();
        }, reject);
      });
    }

    function initFallbackEditor() {
      usingFallbackEditor = true;
      codeEditorEl.style.display = 'none';
      fallbackEditorEl.style.display = 'block';
      let fallbackDebounceTimer = null;
      fallbackEditorEl.addEventListener('input', () => {
        if (!state.activeId) return;
        const file = getActiveFile();
        if (!file) return;
        file.code = fallbackEditorEl.value;
        saveState();
        broadcastFileUpdate(file); // Notify other instances
        clearTimeout(fallbackDebounceTimer);
        fallbackDebounceTimer = setTimeout(() => {
          if (authToken && currentWorkspaceId) {
            saveFileToServer(file);
          }
          if (fileHandles[file.id]) {
            writeToFileHandle(file.id, fileHandles[file.id], file.code);
          }
        }, 400);
        updateCursor();
      });
      fallbackEditorEl.addEventListener('click', updateCursor);
      fallbackEditorEl.addEventListener('keyup', updateCursor);
      fallbackEditorEl.addEventListener('select', updateCursor);
      fallbackEditorEl.addEventListener('scroll', updateCursor);
      fallbackEditorEl.addEventListener('keydown', (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
          event.preventDefault();
          const file = getActiveFile();
          flushCurrentFile();
          saveState();
          if (file && fileHandles[file.id]) {
            writeToFileHandle(file.id, fileHandles[file.id], file.code);
          }
          setRunOutputMessage('Saved');
        }
      });
      setRunOutputMessage('Monaco could not load. Using fallback editor.');
    }

    function renderWorkspaceMenu() {
      workspaceSelect.innerHTML = '';

      if (!authToken || !currentUser) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'Login for workspaces';
        workspaceSelect.appendChild(option);
        workspaceSelect.disabled = true;
        createWorkspaceBtn.disabled = true;
        addMemberBtn.disabled = true;
        return;
      }

      workspaceSelect.disabled = false;
      createWorkspaceBtn.disabled = false;
      addMemberBtn.disabled = false;

      if (!workspaces.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'Personal Workspace';
        workspaceSelect.appendChild(option);
        workspaceSelect.value = '';
        currentWorkspaceId = '';
        sessionStorage.removeItem('itecify-workspace-id');
        return;
      }

      workspaces.forEach((workspace) => {
        const option = document.createElement('option');
        option.value = workspace.id;
        option.textContent = workspace.name;
        workspaceSelect.appendChild(option);
      });

      const validCurrent = workspaces.some((workspace) => workspace.id === currentWorkspaceId);
      currentWorkspaceId = validCurrent ? currentWorkspaceId : workspaces[0].id;
      workspaceSelect.value = currentWorkspaceId;
      sessionStorage.setItem('itecify-workspace-id', currentWorkspaceId);
    }

    async function refreshWorkspaces() {
      if (!authToken) {
        workspaces = [];
        renderWorkspaceMenu();
        return;
      }

      try {
        const res = await fetch('/api/workspaces', {
          headers: { Authorization: 'Bearer ' + authToken }
        });
        if (!res.ok) throw new Error('Workspace list unavailable');
        const data = await res.json();
        workspaces = Array.isArray(data.workspaces) ? data.workspaces : [];
      } catch (err) {
        workspaces = [];
      }

      renderWorkspaceMenu();
    }

    async function verifySession() {
      loadCurrentUser();
      if (!authToken) {
        window.location.href = '/login.html';
        updateAuthUI();
        renderWorkspaceMenu();
        return;
      }
      try {
        const res = await fetch('/api/auth/me', {
          headers: { Authorization: 'Bearer ' + authToken }
        });
        if (!res.ok) throw new Error('Session expired');
        const data = await res.json();
        currentUser = data.user || null;
        sessionStorage.setItem('itecify-current-user', JSON.stringify(currentUser));
      } catch (err) {
        authToken = '';
        currentUser = null;
        sessionStorage.removeItem('itecify-auth-token');
        sessionStorage.removeItem('itecify-current-user');
        window.location.href = '/login.html';
      }
      updateAuthUI();
      await refreshWorkspaces();
    }

    function resetDefaultState() {
      state = {
        files: DEFAULT_FILES.map((file) => ({ ...file })),
        activeId: DEFAULT_FILES[0].id,
        openTabs: DEFAULT_FILES.map((file) => file.id),
        agents: [{ id: 'agent-code', name: 'Code Assistant' }]
      };
      history = {};
      state.files.forEach((file) => {
        history[file.id] = { undo: [], redo: [] };
      });
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(getStorageKey());
        if (raw) {
          state = JSON.parse(raw);
        } else {
          const legacyRaw = localStorage.getItem('itecify-ide-state-v2');
          if (legacyRaw) state = JSON.parse(legacyRaw);
        }
      } catch (e) {
        console.warn('load state failed', e);
      }
      if (!Array.isArray(state.files) || !state.files.length) {
        resetDefaultState();
      }
      if (!Array.isArray(state.agents) || !state.agents.length) {
        state.agents = [{ id: 'agent-code', name: 'Code Assistant' }];
      }
      if (!Array.isArray(state.openTabs)) {
        state.openTabs = state.files.map((file) => file.id);
      }
      state.openTabs = state.openTabs.filter((id) => state.files.some((file) => file.id === id));
      if (!state.openTabs.length && state.files.length) {
        state.openTabs = [state.files[0].id];
      }
      if (!state.activeId && state.files.length) state.activeId = state.files[0].id;
      if (state.activeId && !state.openTabs.includes(state.activeId)) {
        state.openTabs.push(state.activeId);
      }
      state.files.forEach((file) => { if (!history[file.id]) history[file.id] = { undo: [], redo: [] }; });
    }

    // Load files from server
    async function loadFilesFromServer() {
      if (!currentWorkspaceId || !authToken) return;

      try {
        const res = await fetch(`/api/workspaces/${currentWorkspaceId}/files`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const data = await res.json();

        if (res.ok && Array.isArray(data.files)) {
          // Merge server files with local files, avoiding duplicates
          const serverFileIds = new Set(data.files.map(f => f.id));

          // Keep local files that don't exist on server (in-progress work)
          const localFiles = state.files.filter(f => !serverFileIds.has(f.id) && !f.id.startsWith('temp-'));

          if (data.files.length > 0) {
            // Use server files as base, add any local-only files
            state.files = [...data.files.map(f => ({ ...f }))];
            // Add local files that weren't on server
            localFiles.forEach(f => {
              if (!state.files.find(sf => sf.id === f.id)) {
                state.files.push(f);
              }
            });
            state.activeId = state.files[0].id;
          } else if (localFiles.length > 0) {
            // No server files, but have local files - upload them
            state.files = localFiles;
            state.activeId = state.files[0].id;
            for (const file of state.files) {
              await saveFileToServer(file);
            }
          } else {
            // No files anywhere - let user create their own
            state.files = [];
            state.activeId = null;
          }
          state.files.forEach(file => {
            if (!history[file.id]) history[file.id] = { undo: [], redo: [] };
          });
          renderFiles();
          if (state.activeId) selectFile(state.activeId);
          console.log(`✓ Loaded ${state.files.length} files from server`);
        }
      } catch (err) {
        console.warn('Failed to load files from server:', err);
      }
    }

    // Save a single file to server
    async function saveFileToServer(file) {
      if (!authToken) return null;
      try {
        const res = await fetch(`/api/files/${file.id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify({
            name: file.name,
            language: file.language,
            code: file.code
          })
        });
        if (!res.ok) {
          console.warn('Failed to save file to server:', file.name);
        }
        return res.ok;
      } catch (err) {
        console.warn('Error saving file to server:', err);
        return false;
      }
    }

    // Create file on server
    async function createFileOnServer(id, name, language, code) {
      if (!authToken || !currentWorkspaceId) return null;
      try {
        const res = await fetch(`/api/workspaces/${currentWorkspaceId}/files`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify({ id, name, language, code, creatorId: currentUser?.id })
        });
        const data = await res.json();
        if (res.ok && data.file) {
          return data.file;
        }
      } catch (err) {
        console.warn('Error creating file on server:', err);
      }
      return null;
    }

    async function deleteFileFromServer(fileId) {
      if (!authToken) return;
      try {
        await fetch(`/api/files/${fileId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
      } catch (err) {
        console.warn('Error deleting file from server:', err);
      }
    }

    function initializeSyncWebSocket() {
      if (syncWebSocket) return; // Already connected
      if (!authToken || !currentWorkspaceId) return;

      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.host;
      const url = `${protocol}//${host}/sync/${currentWorkspaceId}?token=${encodeURIComponent(authToken)}`;

      try {
        syncWebSocket = new WebSocket(url);
        syncWebSocket.onopen = () => {
          console.log('✓ Sync websocket connected');
          // Send initial presence
          if (currentUser) {
            sendCursorUpdate();
          }
        };
        syncWebSocket.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type === 'cursor-update') {
              updateRemoteCursor(data);
            }
          } catch (err) {
            console.warn('Sync message parse error:', err.message);
          }
        };
        syncWebSocket.onerror = (err) => {
          console.warn('Sync websocket error:', err);
        };
        syncWebSocket.onclose = () => {
          console.log('Sync websocket closed');
          syncWebSocket = null;
          // Try to reconnect after 3 seconds
          setTimeout(initializeSyncWebSocket, 3000);
        };
      } catch (err) {
        console.warn('Failed to initialize sync websocket:', err.message);
      }
    }

    function closeSyncWebSocket() {
      if (syncWebSocket) {
        syncWebSocket.close();
        syncWebSocket = null;
      }
      // Clear all remote cursors
      Object.keys(remoteCursors).forEach(userId => {
        removeRemoteCursor(userId);
      });
      remoteCursors = {};
    }

    function broadcastFileUpdate(file) {
      if (!file) return;
      const code = monacoEditor ? monacoEditor.getValue() : file.code;
      const payload = {
        fileId: file.id,
        code: code,
        language: file.language,
        timestamp: Date.now()
      };
      localStorage.setItem('itecify-collab-update', JSON.stringify(payload));
    }

    window.addEventListener('storage', (event) => {
      if (event.key !== 'itecify-collab-update' || !event.newValue) return;
      try {
        const data = JSON.parse(event.newValue);
        if (!data.fileId) return;
        const file = state.files.find(f => f.id === data.fileId);
        if (!file) return;
        if (file.code === data.code) return;
        file.code = data.code;
        if (state.activeId === file.id && monacoEditor) {
          suppressEditorChange = true;
          const position = monacoEditor.getPosition();
          monacoEditor.setValue(data.code);
          if (position) monacoEditor.setPosition(position);
          suppressEditorChange = false;
        }
        if (state.activeId === file.id) {
          statusFile.textContent = file.name + ' [' + file.language + '] (updated remotely)';
        }
        renderFiles();
        saveState();
      } catch (err) {
        console.warn('collab update parse failed', err);
      }
    });

    function renderFiles() {
      fileListEl.innerHTML = '';
      tabBarEl.innerHTML = '';
      state.files.forEach(file => {
        const row = document.createElement('div');
        row.className = 'file-item' + (file.id === state.activeId ? ' active' : '');
        if (file.id === 'temp-new') {
          const input = document.createElement('input');
          input.type = 'text';
          input.id = 'new-file-input';
          input.placeholder = 'e.g. index.html, main.py, app.js';
          input.value = file.name; // restore previously typed value from state
          input.autocomplete = 'off';
          input.spellcheck = false;
          row.appendChild(input);
          fileListEl.appendChild(row);

          // Hint line beneath the input
          const hint = document.createElement('div');
          hint.className = 'file-new-hint';
          hint.textContent = 'Extensions: .html .css .js .py .c .cpp .cs .rs';
          fileListEl.appendChild(hint);

          let confirmed = false;

          const showError = (msg) => {
            hint.textContent = msg;
            hint.className = 'file-new-hint err';
            input.classList.add('error');
            setTimeout(() => input.classList.remove('error'), 250);
            input.focus();
          };

          const tryConfirm = (valueOverride) => {
            if (confirmed) return;
            // Use override (from state) or live input value
            const val = (valueOverride !== undefined ? valueOverride : input.value).trim();
            if (!val) {
              confirmed = true;
              state.files = state.files.filter(f => f.id !== 'temp-new');
              renderFiles();
              return;
            }
            const ext = val.split('.').pop().toLowerCase();
            const supported = ['js', 'mjs', 'jsx', 'py', 'rs', 'c', 'cpp', 'cc', 'cxx', 'cs', 'html', 'htm', 'css'];
            if (!ext || ext === val) {
              showError('⚠ Add an extension: .html .js .py .cpp .c .cs .rs .css');
              return;
            }
            if (!supported.includes(ext)) {
              showError(`⚠ Unsupported extension ".${ext}" — use .html .js .py .cpp …`);
              return;
            }
            confirmed = true;
            confirmNewFile(val);
          };

          // Persist typed value into state on every keystroke so renderFiles() rebuilds correctly
          input.oninput = () => {
            const tempEntry = state.files.find(f => f.id === 'temp-new');
            if (tempEntry) tempEntry.name = input.value;
          };

          input.onkeydown = (e) => {
            if (e.key === 'Enter') { e.preventDefault(); tryConfirm(); }
            if (e.key === 'Escape') {
              confirmed = true;
              state.files = state.files.filter(f => f.id !== 'temp-new');
              renderFiles();
            }
          };

          // On blur: read value from state (in case DOM was rebuilt before blur fired)
          input.onblur = () => {
            const tempEntry = state.files.find(f => f.id === 'temp-new');
            const savedVal = tempEntry ? tempEntry.name : input.value;
            tryConfirm(savedVal);
          };

          // Auto-focus after render is complete
          requestAnimationFrame(() => { const el = document.getElementById('new-file-input'); if (el) el.focus(); });
          tabBarEl; // no tab for temp-new
        } else {
          const label = document.createElement('span');
          label.textContent = file.name;
          row.appendChild(label);
          row.onclick = () => selectFile(file.id);

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = 'X';
          deleteBtn.onclick = (e) => { e.stopPropagation(); deleteFile(file.id); };
          row.appendChild(deleteBtn);
          fileListEl.appendChild(row);

          if (state.openTabs.includes(file.id)) {
            const tab = document.createElement('div');
            tab.className = 'tab' + (file.id === state.activeId ? ' active' : '');
            tab.onclick = () => selectFile(file.id);

            const tabLabel = document.createElement('span');
            tabLabel.className = 'tab-label';
            tabLabel.textContent = file.name;
            tab.appendChild(tabLabel);

            const closeBtn = document.createElement('button');
            closeBtn.className = 'tab-close';
            closeBtn.type = 'button';
            closeBtn.textContent = 'x';
            closeBtn.title = 'Close tab';
            closeBtn.onclick = (e) => {
              e.stopPropagation();
              closeTab(file.id);
            };
            tab.appendChild(closeBtn);

            tabBarEl.appendChild(tab);
          }
        }
      });
    }

    function getActiveFile() { return state.files.find(f => f.id === state.activeId); }

    function selectFile(fileId, options = {}) {
      const file = state.files.find(f => f.id === fileId);
      if (!file) return;
      if (!options.skipFlush) {
        flushCurrentFile();
      }
      if (!state.openTabs.includes(file.id)) {
        state.openTabs.push(file.id);
      }
      state.activeId = file.id;
      setEditorValue(file.code, file.language);
      statusFile.textContent = file.name + ' [' + file.language + ']';
      // Clear stale output from the previous file
      setRunOutputMessage('Output will appear here.');
      renderFiles();
      updateCursor();
      saveState();
      initializeYjsProvider();
      initializeSyncWebSocket();
      if (syncRootHandle) {
        syncFileToDisk(file);
      }
    }

    function flushCurrentFile() {
      const file = getActiveFile();
      if (!file || !monacoEditor) return;
      const editorValue = getEditorValue();
      if (file.code !== editorValue) {
        history[file.id].undo.push(file.code);
        history[file.id].redo = [];
        file.code = editorValue;
      }
    }

    function createFile(name, language, initialCode) {
      const id = 'file-' + Date.now() + '-' + Math.random().toString(16).slice(2);
      const file = { id, name, language, code: initialCode };
      state.files.push(file);
      state.openTabs.push(id);
      if (!history[id]) history[id] = { undo: [], redo: [] };
      selectFile(id);
      saveState();

      // Save to server with local ID
      if (authToken && currentWorkspaceId) {
        createFileOnServer(id, name, language, initialCode).then(serverFile => {
          if (serverFile && serverFile.id !== id) {
            // Server returned a different ID - update local references
            const idx = state.files.findIndex(f => f.id === id);
            if (idx !== -1) {
              history[serverFile.id] = history[id];
              delete history[id];
              state.files[idx] = { ...serverFile };
              if (state.activeId === id) {
                state.activeId = serverFile.id;
              }
              renderFiles();
            }
          }
        });
      }

      if (syncRootHandle) {
        syncFileToDisk(file);
      }
    }

    function closeTab(id) {
      if (!state.openTabs.includes(id)) return;
      if (state.openTabs.length <= 1) return;
      state.openTabs = state.openTabs.filter((tabId) => tabId !== id);
      if (state.activeId === id) {
        const nextTabId = state.openTabs[state.openTabs.length - 1];
        state.activeId = nextTabId;
        renderFiles();
        selectFile(nextTabId, { skipFlush: true });
        saveState();
        return;
      }
      renderFiles();
      saveState();
    }

    function deleteFile(id) {
      state.files = state.files.filter(f => f.id !== id);
      state.openTabs = state.openTabs.filter((tabId) => tabId !== id);
      delete history[id];
      if (state.activeId === id) state.activeId = state.files[0].id;
      if (state.activeId && !state.openTabs.includes(state.activeId)) {
        state.openTabs.push(state.activeId);
      }
      saveState();
      renderFiles();
      if (state.activeId) selectFile(state.activeId);

      // Delete from server
      if (authToken) {
        deleteFileFromServer(id);
      }
    }

    function undo() {
      if (monacoEditor) {
        monacoEditor.trigger('keyboard', 'undo', null);
        return;
      }
      if (usingFallbackEditor) fallbackEditorEl.focus();
      document.execCommand('undo');
    }

    function redo() {
      if (monacoEditor) {
        monacoEditor.trigger('keyboard', 'redo', null);
        return;
      }
      if (usingFallbackEditor) fallbackEditorEl.focus();
      document.execCommand('redo');
    }

    function updateCursor() {
      let lineNumber = 1, column = 1;

      if (monacoEditor) {
        const position = monacoEditor.getPosition();
        if (position) {
          lineNumber = position.lineNumber;
          column = position.column;
        }
        cursorPos.textContent = 'Ln ' + lineNumber + ', Col ' + column;
      } else if (usingFallbackEditor) {
        const value = fallbackEditorEl.value.slice(0, fallbackEditorEl.selectionStart);
        const lines = value.split('\n');
        lineNumber = lines.length;
        column = (lines[lines.length - 1] || '').length + 1;
        cursorPos.textContent = 'Ln ' + lineNumber + ', Col ' + column;
      } else {
        cursorPos.textContent = 'Ln 1, Col 1';
        return;
      }

      // Broadcast cursor to collaborators
      sendCursorUpdate(lineNumber, column);
    }

    function sendCursorUpdate(lineNumber, column) {
      if (!syncWebSocket || syncWebSocket.readyState !== WebSocket.OPEN) return;
      if (!currentUser || !state.activeId) return;

      const message = {
        type: 'cursor-update',
        userId: currentUser.id,
        instanceId: currentInstanceId,
        username: currentUser.username,
        fileId: state.activeId,
        line: lineNumber || 1,
        column: column || 1
      };

      try {
        syncWebSocket.send(JSON.stringify(message));
      } catch (err) {
        console.warn('Failed to send cursor update:', err.message);
      }
    }

    function updateRemoteCursor(data) {
      const senderId = data.instanceId || data.userId;
      if (senderId === currentInstanceId || (!data.instanceId && data.userId === currentUser?.id)) return; // Ignore own cursor
      if (data.fileId !== state.activeId) return; // Only show cursors in current file

      if (!remoteCursors[senderId]) {
        const color = CURSOR_COLORS[cursorColorIndex % CURSOR_COLORS.length];
        const cssClass = 'remote-user-' + senderId.replace(/[^a-zA-Z0-9]/g, '');
        remoteCursors[senderId] = {
          username: data.username,
          color: color,
          cssClass: cssClass
        };
        cursorColorIndex++;

        if (!document.getElementById('style-' + cssClass)) {
          const style = document.createElement('style');
          style.id = 'style-' + cssClass;
          style.textContent = `.${cssClass} { border-left: 2px solid ${color} !important; border-right: none !important; margin-left: -2px; }`;
          document.head.appendChild(style);
        }
      }

      const cursor = remoteCursors[senderId];
      cursor.line = data.line;
      cursor.column = data.column;
      cursor.timestamp = Date.now();

      renderRemoteCursor(senderId);
      updateCollaboratorsDisplay();
    }

    function renderRemoteCursor(userId) {
      if (!monacoEditor) return;

      const cursor = remoteCursors[userId];
      if (!cursor) return;

      // Remove old decoration if exists
      if (remoteDecorations[userId]) {
        monacoEditor.deltaDecorations(
          [remoteDecorations[userId]],
          []
        );
      }

      // Create new cursor decoration
      const decorations = monacoEditor.deltaDecorations(
        [],
        [{
          range: new monaco.Range(cursor.line, cursor.column, cursor.line, cursor.column + 1),
          options: {
            isWholeLine: false,
            className: 'remote-cursor ' + (cursor.cssClass || ''),
            glyphMarginClassName: 'remote-cursor-glyph',
            glyphMarginHoverMessage: { value: cursor.username + '\'s cursor' },
            stickiness: 1, // NeverGrowsWhenTypingAtEdges
            after: {
              content: cursor.username,
              inlineClassName: 'remote-cursor-label',
              color: cursor.color,
              backgroundColor: cursor.color + '20'
            }
          }
        }]
      );

      remoteDecorations[userId] = decorations[0];
    }

    function removeRemoteCursor(userId) {
      if (remoteDecorations[userId]) {
        monacoEditor?.deltaDecorations([remoteDecorations[userId]], []);
        delete remoteDecorations[userId];
      }
      delete remoteCursors[userId];
      updateCollaboratorsDisplay();
    }

    // Periodic updates to keep cursor alive and cleanup stale ones
    setInterval(() => {
      updateCursor();
      const now = Date.now();
      let changed = false;
      Object.keys(remoteCursors).forEach(id => {
        if (now - (remoteCursors[id].timestamp || 0) > 12000) {
          removeRemoteCursor(id);
          changed = true;
        }
      });
      if (changed) updateCollaboratorsDisplay();
    }, 4000);

    function updateCollaboratorsDisplay() {
      const multiCursorStatus = document.getElementById('multiCursorStatus');
      if (!multiCursorStatus) return;

      const users = Object.entries(remoteCursors).map(([_, cursor]) => {
        const indicator = `<span class="cursor-indicator" style="background-color: ${cursor.color}"></span>`;
        return `${indicator}<span style="color: ${cursor.color}; opacity: 0.9;">${cursor.username}</span>`;
      });

      if (users.length === 0) {
        multiCursorStatus.innerHTML = 'Collaborators: <span id="multiCursorList">None</span>';
      } else {
        multiCursorStatus.innerHTML = `Collaborators (${users.length}): <span id="multiCursorList">${users.join(', ')}</span>`;
      }
    }

    function getFirstHtmlFile(preferredId) {
      return state.files.find(file => file.id === preferredId && file.language === 'html')
        || state.files.find(file => file.language === 'html')
        || null;
    }

    function buildPreviewDocument(htmlCode, cssCode = '') {
      const source = String(htmlCode || TEMPLATES.html);
      const closingHeadIndex = source.toLowerCase().indexOf('</head>');

      if (closingHeadIndex !== -1) {
        return source.slice(0, closingHeadIndex)
          + (cssCode ? '\n<style>\n' + cssCode + '\n</style>\n' : '\n')
          + source.slice(closingHeadIndex);
      }

      return '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>Preview</title>\n'
        + (cssCode ? '<style>\n' + cssCode + '\n</style>\n' : '')
        + '</head>\n<body>\n'
        + source
        + '\n</body>\n</html>\n';
    }

    function renderPreview(srcdoc) {
      runOutput.classList.remove('error-output');
      runOutput.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.style.width = '100%';
      iframe.style.height = '300px';
      iframe.style.border = '1px solid #444';
      iframe.setAttribute('sandbox', 'allow-scripts');
      iframe.srcdoc = srcdoc;
      runOutput.appendChild(iframe);
    }

    function openHtmlPreviewWindow(srcdoc, fileName) {
      if (htmlPreviewWindow && htmlPreviewWindow.closed) {
        htmlPreviewWindow = null;
      }

      htmlPreviewWindow = htmlPreviewWindow && !htmlPreviewWindow.closed
        ? htmlPreviewWindow
        : window.open('', 'itecify-html-preview', 'width=1100,height=760,resizable=yes,scrollbars=yes');

      if (!htmlPreviewWindow) {
        setRunOutputMessage('Popup blocked. Allow popups to preview HTML.', true);
        return false;
      }

      htmlPreviewWindow.document.open();
      htmlPreviewWindow.document.write(srcdoc);
      htmlPreviewWindow.document.close();
      htmlPreviewWindow.document.title = fileName || 'HTML Preview';
      htmlPreviewWindow.focus();
      return true;
    }



    function promptForProgramInput(file) {
      if (!file || file.language === 'html' || file.language === 'css') {
        return '';
      }
      return window.prompt(
        'Program input for ' + file.name + ':\nEnter values exactly as stdin should receive them. Leave blank for no input.',
        ''
      );
    }

    async function runFile(file, inputText = '', setOutput = true) {
      if (!file) {
        if (setOutput) setRunOutputMessage('No file selected.', true);
        return 'No file selected.';
      }

      clearEditorDiagnostics();

      if (file.language === 'html') {
        const cssCode = state.files
          .filter(candidate => candidate.language === 'css')
          .map(candidate => candidate.code)
          .join('\n\n');
        const srcdoc = buildPreviewDocument(file.code, cssCode);
        if (setOutput) {
          const opened = openHtmlPreviewWindow(srcdoc, file.name);
          setRunOutputMessage(opened
            ? 'HTML preview opened in a new window.'
            : 'Popup blocked. Allow popups to preview HTML.', !opened);
        }
        return '[HTML preview opened in popup]';
      }

      if (file.language === 'css') {
        const htmlFile = getFirstHtmlFile(state.activeId);
        const previewHtml = htmlFile ? htmlFile.code : TEMPLATES.html;
        if (setOutput) renderPreview(buildPreviewDocument(previewHtml, file.code));
        const msg = htmlFile
          ? 'CSS rendered in preview using ' + htmlFile.name + '.'
          : 'CSS rendered in preview using the default HTML starter.';
        if (setOutput && !htmlFile) {
          const note = document.createElement('div');
          note.style.paddingTop = '8px';
          note.style.color = '#9da5b8';
          note.textContent = msg;
          runOutput.appendChild(note);
        }
        return msg;
      }

      try {
        const res = await fetch('/api/sandbox/run', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(authToken ? { Authorization: 'Bearer ' + authToken } : {})
          },
          body: JSON.stringify({
            language: file.language === 'js' ? 'nodejs' : file.language,
            code: file.code,
            input: inputText || '',
            workspaceId: currentWorkspaceId || undefined
          })
        });

        if (!res.ok) {
          const text = await res.text();
          const msg = 'Run failed: ' + res.status + '\n' + text;
          if (setOutput) setRunOutputMessage(msg, true);
          return msg;
        }
        const data = await res.json();
        const failed = data.ok === false || data.code !== 0;
        if (failed) {
          showEditorDiagnostics(data.stderr || data.stdout || '');
        }
        const msg = 'exit=' + (data.code ?? '?') + '\nstdout:\n' + (data.stdout || '') + '\nstderr:\n' + (data.stderr || '');
        if (setOutput) setRunOutputMessage(msg, failed);
        return msg;
      } catch (err) {
        const msg = 'Run error: ' + err.message;
        if (setOutput) setRunOutputMessage(msg, true);
        return msg;
      }
    }

    async function runActive() {
      const file = getActiveFile();
      if (!file) {
        setRunOutputMessage('No file selected.', true);
        return;
      }
      flushCurrentFile();
      const inputText = promptForProgramInput(file);
      if (inputText === null) {
        setRunOutputMessage('Run cancelled.');
        return;
      }
      await runFile(file, inputText);
    }

    let pendingAISuggestion = null; // Track pending AI suggestion

    const sendAIPrompt = async (promptText, suggestionsEl) => {
      const prompt = promptText.trim();
      if (!prompt) {
        suggestionsEl.textContent = 'Please enter a prompt first.';
        return;
      }
      const file = getActiveFile();
      if (!file) {
        suggestionsEl.textContent = 'Please select a file first.';
        return;
      }
      suggestionsEl.textContent = 'Thinking...';
      setRunOutputMessage('AI is processing your prompt...');
      try {
        const headers = { 'Content-Type': 'application/json' };
        // Attach browser-stored key as a header if present
        const localKey = localStorage.getItem('itecify-openai-key');
        if (localKey) headers['x-openai-key'] = localKey;

        // Include current code context in the prompt
        const contextPrompt = `You are a code assistant. The user is currently working on a ${file.language} file named "${file.name}".

Current code:
\`\`\`${file.language}
${file.code}
\`\`\`

User request: ${prompt}

If the user asks you to modify the code, respond with ONLY the complete modified code block wrapped in triple backticks (\`\`\`language ... \`\`\`), with no other text. Otherwise, provide your response normally.`;

        const res = await fetch('/api/ai', {
          method: 'POST',
          headers,
          body: JSON.stringify({ prompt: contextPrompt })
        });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(res.status + ' ' + txt);
        }
        const data = await res.json();
        const text = data.response || '[No response]';

        // Try to extract code block
        const codeBlockRegex = /```([a-zA-Z0-9]*)?\s*([\s\S]*?)```/;
        const match = text.match(codeBlockRegex);

        if (match && match[2]) {
          const suggestedCode = match[2].trim();
          const suggestionId = 'suggestion-' + Date.now();

          // Store the suggestion
          pendingAISuggestion = {
            id: suggestionId,
            code: suggestedCode,
            fileId: file.id,
            original: file.code
          };

          // Show visual diff in editor
          showAISuggestionInEditor(suggestedCode, file.code, file.language);

          // Show in panel
          suggestionsEl.innerHTML = `<div style="background:rgba(100,200,100,0.1);padding:10px;border-radius:4px;margin-bottom:10px;border:1px solid rgba(100,200,100,0.3);">
            <div style="color:#8f8;margin-bottom:8px;font-weight:bold;">✓ Code modification suggested</div>
            <div style="color:#aaa;font-size:12px;margin-bottom:10px;">Review the changes in the editor (highlighted in green)</div>
            <div style="display:flex;gap:8px;">
              <button style="background:#4a8a4a;border:1px solid #6aaa6a;color:#fff;padding:6px 12px;border-radius:3px;cursor:pointer;font-size:12px;" onclick="acceptAISuggestion();">✓ Accept</button>
              <button style="background:#4a4a4a;border:1px solid #6a6a6a;color:#aaa;padding:6px 12px;border-radius:3px;cursor:pointer;font-size:12px;" onclick="rejectAISuggestion();">✗ Reject</button>
            </div>
          </div>`;
          setRunOutputMessage('AI suggested changes. Review in editor and click Accept or Reject.');
        } else {
          suggestionsEl.textContent = text;
          setRunOutputMessage('AI response received.');
        }
      } catch (err) {
        suggestionsEl.textContent = 'AI error: ' + (err.message || err);
        setRunOutputMessage('AI error: ' + (err.message || err), true);
      }
    };

    const showAISuggestionInEditor = (suggestedCode, originalCode, language) => {
      if (!monacoEditor) return;

      // Clear previous decorations
      if (monacoEditor._aiDecorations) {
        monacoEditor.deltaDecorations(monacoEditor._aiDecorations, []);
      }

      // Create decorations for changed lines
      const originalLines = originalCode.split('\n');
      const suggestedLines = suggestedCode.split('\n');
      const decorations = [];

      // Simple line-by-line comparison
      for (let i = 0; i < Math.max(originalLines.length, suggestedLines.length); i++) {
        if (originalLines[i] !== suggestedLines[i]) {
          decorations.push({
            range: new monaco.Range(i + 1, 1, i + 1, 1),
            options: {
              isWholeLine: true,
              className: 'ai-suggestion-line',
              backgroundColor: 'rgba(100, 200, 100, 0.15)',
              border: '2px solid rgba(100, 200, 100, 0.4)',
              borderLeft: '4px solid rgb(100, 200, 100)',
            }
          });
        }
      }

      monacoEditor._aiDecorations = monacoEditor.deltaDecorations(
        monacoEditor._aiDecorations || [],
        decorations
      );
    };

    const clearAISuggestionDecorations = () => {
      if (monacoEditor && monacoEditor._aiDecorations) {
        monacoEditor.deltaDecorations(monacoEditor._aiDecorations, []);
        monacoEditor._aiDecorations = [];
      }
    };

    // Global function to accept AI suggestions

      if (!pendingAISuggestion) {

      const file = getActiveFile();
      if (!file || file.id !== pendingAISuggestion.fileId) {

      // Update file code and editor
      history[file.id].undo.push(file.code);
      history[file.id].redo = [];
      file.code = pendingAISuggestion.code;

      if (monacoEditor) {
        monacoEditor.setValue(pendingAISuggestion.code);
      }

      clearAISuggestionDecorations();
      pendingAISuggestion = null;

      saveState();
      broadcastFileUpdate(file);

      // Save to server
      if (authToken && currentWorkspaceId) {
        saveFileToServer(file);

      setRunOutputMessage('✓ AI changes applied to ' + file.name);
      agentPanelSuggestions.textContent = 'Changes applied! Type a new prompt to continue.';

    function confirmNewFile(name) {
      if (!name || !name.trim()) {
        state.files = state.files.filter(f => f.id !== 'temp-new');
        renderFiles();
        return;
      }
      const trimmed = name.trim();
      const lang = getLanguageFromExtension(trimmed);
      const template = TEMPLATES[lang] || '';
      state.files = state.files.filter(f => f.id !== 'temp-new');
      createFile(trimmed, lang, template);
    }

    // Button handlers
    document.getElementById('newFileBtn').onclick = () => {
      // If a temp-new entry already exists, just focus it
      if (state.files.find(f => f.id === 'temp-new')) {
        const el = document.getElementById('new-file-input');
        if (el) el.focus();
        return;
      }
      state.files.push({ id: 'temp-new', name: '', language: 'nodejs', code: '' });
      renderFiles();
    };

    document.getElementById('importFileBtn').onclick = () => fileUpload.click();

    document.getElementById('saveFileBtn').onclick = () => {
      const file = getActiveFile();
      flushCurrentFile();
      saveState();
      if (file && fileHandles[file.id]) {
        writeToFileHandle(file.id, fileHandles[file.id], file.code);
      }
      setRunOutputMessage('Saved');
    };



    const saveToPcBtn = document.getElementById('saveToPcBtn');
    if (saveToPcBtn) {
      saveToPcBtn.onclick = async () => {
        const file = getActiveFile();
        if (!file) {
          setRunOutputMessage('No file selected.', true);
          return;
        }
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: file.name,
          });
          fileHandles[file.id] = handle;
          await writeToFileHandle(file.id, handle, file.code);
          setRunOutputMessage(`✓ File linked! Changes will now auto-save to PC as ${handle.name}.`);
        } catch (err) {
          if (err.name !== 'AbortError') {
            setRunOutputMessage('Save to PC failed: ' + err.message, true);
          }
        }
      };
    }

    document.getElementById('runActiveBtn').onclick = runActive;
    document.getElementById('undoBtn').onclick = undo;
    document.getElementById('redoBtn').onclick = redo;

    fileUpload.addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const lang = getLanguageFromExtension(file.name);
        createFile(file.name, lang, String(reader.result || ''));
        event.target.value = '';
      };
      reader.readAsText(file);
    });

    // Initialize app
    (async () => {
      try {
        await verifySession();
        loadState();
        renderFiles();
        renderAgents();
        try {
          await initMonaco();
        } catch (editorErr) {
          initFallbackEditor();
        }
        if (state.activeId) selectFile(state.activeId, { skipFlush: true });
      } catch (err) {
        setRunOutputMessage('Editor failed to load: ' + (err.message || err), true);
      }
    })();
  </script>
</body>

</html>
