<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iTECify IDE</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: Segoe UI, Roboto, Arial, sans-serif; background:#1e1e1e; color:#ddd; min-height:100vh; }
      .container { display:grid; grid-template-rows:auto 1fr; height:100vh; }
      .top { background:#252526; border-bottom:1px solid #333; padding:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
      .top h1 { margin:0; font-size:16px; color:#fff; }
      .top .controls { display:inline-flex; gap:8px; flex-wrap:wrap; }
      .top button, .top select, .top input { background:#2a2a2f; border:1px solid #444; color:#eee; border-radius:4px; padding:5px 8px; font-size:13px; cursor:pointer; }
      .top button:hover, .top select:hover { background:#353540; }
      .main { display:grid; grid-template-columns:220px 1fr; min-height:0; }
      .sidebar { background:#20202a; border-right:1px solid #333; display:flex; flex-direction:column; min-height:0; }
      .panel-title { font-size:11px; color:#a0a7b0; text-transform:uppercase; padding:8px; border-bottom:1px solid #333; margin:0; }
      .file-list, .agent-list { overflow:auto; padding:6px; flex:1; }
      .file-item, .agent-item { background:#2b2c33; color:#e1e1e1; margin-bottom:6px; border-radius:4px; border:1px solid #3c3d46; padding:6px 8px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-size:13px; }
      .file-item span, .agent-item span { flex:1; }
      .file-item button, .agent-item button { background:#3a3a40; border:1px solid #555; color:#ccc; border-radius:3px; padding:2px 6px; font-size:11px; cursor:pointer; }
      .file-item button:hover, .agent-item button:hover { background:#454550; }
      .file-item.active, .agent-item.active { border-color:#5f9cff; background:#32354e; }
      .editor-wrap { display:flex; flex-direction:column; min-height:0; }
      .tabbar { background:#1f1f24; display:flex; border-bottom:1px solid #333; }
      .tab { cursor:pointer; color:#ccc; padding:8px 10px; font-size:13px; border-right:1px solid #2f2f3b; }
      .tab:hover { background:#2a2a33; }
      .tab.active { background:#2c2f45; color:#fff; border-bottom:3px solid #5f9cff; }
      #codeEditor { flex:1; width:100%; height:100%; border:none; outline:none; background:#11131a; color:#e8ebff; padding:12px; resize:none; font-family:Consolas, Monaco, monospace; font-size:13px; line-height:1.45; }
      .status { background:#16171f; border-top:1px solid #333; color:#9da5b8; padding:6px 10px; display:flex; justify-content:space-between; font-size:12px; }
      .output { background:#101118; color:#c8d0e0; border-top:1px solid #333; padding:10px; font-family:Consolas, Monaco, monospace; font-size:12px; overflow:auto; height:170px; white-space:pre-wrap; }
      .hidden { display:none; }
      .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; }
      .modal { background:#1e1e1e; border:1px solid #444; border-radius:8px; padding:20px; width:90%; max-width:600px; max-height:80vh; overflow:auto; }
      .modal h2 { margin-top:0; color:#fff; }
      .modal-prompt { margin:12px 0; }
      .modal-prompt label { display:block; margin-bottom:6px; font-size:13px; color:#a0a7b0; }
      .modal-prompt textarea { width:100%; height:80px; background:#2a2a2f; border:1px solid #444; border-radius:4px; color:#eee; padding:8px; font-family:Consolas, Monaco, monospace; font-size:12px; resize:vertical; }
      .modal-suggestions { background:#2a2a2f; border:1px solid #444; border-radius:4px; padding:10px; margin:12px 0; max-height:250px; overflow:auto; color:#c8d0e0; font-size:12px; white-space:pre-wrap; }
      .modal-buttons { display:flex; gap:8px; margin-top:16px; }
      .modal-buttons button { flex:1; background:#2a2a2f; border:1px solid #444; color:#eee; border-radius:4px; padding:8px; cursor:pointer; }
      .modal-buttons button:hover { background:#353540; }
      .file-item input { background:#3a3a45; border:1px solid #5f9cff; color:#eee; padding:4px; font-size:13px; flex:1; }
      .file-item input:focus { outline:none; border-color:#7fb3ff; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <h1>iTECify IDE</h1>
        <div class="controls">
          <select id="langSelect" title="Set language for active file">
            <option value="nodejs">JavaScript</option>
            <option value="python">Python</option>
            <option value="rust">Rust</option>
            <option value="c">C</option>
            <option value="cpp">C++</option>
            <option value="csharp">C#</option>
          </select>
          <button id="newFileBtn">New File</button>
          <button id="importFileBtn">Import</button>
          <input id="fileUpload" type="file" class="hidden" />
          <button id="saveFileBtn">Save</button>
          <button id="downloadFileBtn">Download</button>
          <button id="runActiveBtn">Run Active</button>
          <button id="runAllBtn">Run All</button>
          <button id="undoBtn">Undo</button>
          <button id="redoBtn">Redo</button>
        </div>
      </div>
      <div class="main">
        <aside class="sidebar">
          <div class="panel-title">Files</div>
          <div class="file-list" id="fileList"></div>
          <div class="panel-title">AI Agents</div>
          <div class="agent-list" id="agentList"></div>
        </aside>
        <section class="editor-wrap">
          <div class="tabbar" id="tabBar"></div>
          <textarea id="codeEditor" spellcheck="false"></textarea>
          <div class="status"><span id="statusFile">No file selected</span><span id="cursorPos">Ln 1, Col 1</span></div>
          <div class="output" id="runOutput">Output will appear here.</div>
        </section>
      </div>
    </div>

    <div id="aiModal" class="modal-overlay hidden">
      <div class="modal">
        <h2>AI Code Assistant</h2>
        <div class="modal-prompt">
          <label>Your Prompt:</label>
          <textarea id="aiPrompt" placeholder="Ask me to improve the code, add features, fix bugs, etc."></textarea>
        </div>
        <div class="modal-prompt">
          <label>Suggestions:</label>
          <div class="modal-suggestions" id="aiSuggestions">Suggestions will appear here...</div>
        </div>
        <div class="modal-buttons">
          <button id="aiSubmitBtn">Get Suggestions</button>
          <button id="aiCloseBtn">Close</button>
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = 'itecify-ide-state';
      const DEFAULT_FILES = [
        { id:'file-js', name:'main.js', language:'nodejs', code:'// Hello from JavaScript\nconsole.log("Hello, World!");\n' },
        { id:'file-py', name:'main.py', language:'python', code:'# Hello from Python\nprint("Hello, World!")\n' }
      ];
      const TEMPLATES = {
        nodejs:'// Hello from JavaScript\nconsole.log("Hello, World!");\n',
        python:'# Hello from Python\nprint("Hello, World!")\n',
        rust:'// Hello from Rust\nfn main() {\n  println!("Hello, World!");\n}\n',
        c:'#include <stdio.h>\n// Hello from C\nint main() { printf("Hello, World!\\n"); return 0; }\n',
        cpp:'#include <iostream>\n// Hello from C++\nint main() { std::cout << "Hello, World!\\n"; return 0; }\n',
        csharp:'using System;\n// Hello from C#\nclass Program { static void Main() { Console.WriteLine("Hello, World!"); } }\n',
        html:'<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <title>Hello</title>\n</head>\n<body>\n  <h1>Hello, World!</h1>\n</body>\n</html>\n',
        css:'/* Hello from CSS */\nbody { background: #1e1e1e; color: #ddd; font-family: Arial, sans-serif; }\n'
      };

      const fileUpload = document.getElementById('fileUpload');
      const fileListEl = document.getElementById('fileList');
      const tabBarEl = document.getElementById('tabBar');
      const codeEditor = document.getElementById('codeEditor');
      const statusFile = document.getElementById('statusFile');
      const cursorPos = document.getElementById('cursorPos');
      const runOutput = document.getElementById('runOutput');
      const langSelect = document.getElementById('langSelect');
      const agentListEl = document.getElementById('agentList');

      let state = { files: [], activeId: null, agents: [] };
      let history = {};
      let isUndoRedo = false;

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) state = JSON.parse(raw);
        } catch (e) {
          console.warn('load state failed', e);
        }
        if (!Array.isArray(state.files) || !state.files.length) {
          state.files = DEFAULT_FILES.map(f => ({...f}));
          state.activeId = state.files[0].id;
        }
        if (!state.activeId && state.files.length) state.activeId = state.files[0].id;
        state.files.forEach((file) => { if (!history[file.id]) history[file.id] = {undo:[],redo:[]}; });
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function renderFiles() {
        fileListEl.innerHTML = '';
        tabBarEl.innerHTML = '';
        state.files.forEach(file => {
          const row = document.createElement('div');
          row.className = 'file-item' + (file.id === state.activeId ? ' active' : '');
          if (file.id === 'temp-new') {
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'filename.html';
            input.value = file.name;
            input.onkeydown = (e) => {
              if (e.key === 'Enter') confirmNewFile(input.value);
            };
            input.onblur = () => confirmNewFile(input.value);
            row.appendChild(input);
          } else {
            const label = document.createElement('span');
            label.textContent = file.name + ' (' + file.language + ')';
            row.appendChild(label);
            row.onclick = () => selectFile(file.id);
          }
          if (file.id !== 'temp-new') {
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'X';
            deleteBtn.onclick = (e) => { e.stopPropagation(); deleteFile(file.id); };
            row.appendChild(deleteBtn);
          }
          fileListEl.appendChild(row);

          if (file.id !== 'temp-new') {
            const tab = document.createElement('div');
            tab.className = 'tab' + (file.id === state.activeId ? ' active' : '');
            tab.textContent = file.name;
            tab.onclick = () => selectFile(file.id);
            tabBarEl.appendChild(tab);
          }
        });
      }

      function renderAgents() {
        agentListEl.innerHTML = '';
        state.agents.forEach(agent => {
          const row = document.createElement('div');
          row.className = 'agent-item';
          const label = document.createElement('span');
          label.textContent = agent.name;
          row.appendChild(label);
          const openBtn = document.createElement('button');
          openBtn.textContent = 'Open';
          openBtn.onclick = (e) => { e.stopPropagation(); alert('AI Agent: ' + agent.name + ' (stub)'); };
          row.appendChild(openBtn);
          agentListEl.appendChild(row);
        });
      }

      function getActiveFile() { return state.files.find(f => f.id === state.activeId); }

      function selectFile(fileId) {
        const file = state.files.find(f => f.id === fileId);
        if (!file) return;
        flushCurrentFile();
        state.activeId = file.id;
        codeEditor.value = file.code;
        statusFile.textContent = file.name + ' [' + file.language + ']';
        langSelect.value = file.language;
        renderFiles();
        updateCursor();
        saveState();
      }

      function flushCurrentFile() {
        const file = getActiveFile();
        if (!file) return;
        if (file.code !== codeEditor.value) {
          history[file.id].undo.push(file.code);
          history[file.id].redo = [];
          file.code = codeEditor.value;
        }
      }

      function createFile(name, language, initialCode) {
        const id = 'file-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        const file = { id, name, language, code: initialCode };
        state.files.push(file);
        if (!history[id]) history[id] = {undo: [], redo: []};
        selectFile(id);
        saveState();
      }

      function deleteFile(id) {
        if (state.files.length <= 1) { alert('Keep at least one file.'); return; }
        state.files = state.files.filter(f => f.id !== id);
        delete history[id];
        if (state.activeId === id) state.activeId = state.files[0].id;
        saveState();
        renderFiles();
        selectFile(state.activeId);
      }

      function undo() {
        const file = getActiveFile();
        if (!file || !history[file.id] || !history[file.id].undo.length) return;
        history[file.id].redo.push(file.code);
        file.code = history[file.id].undo.pop();
        isUndoRedo = true;
        codeEditor.value = file.code;
        isUndoRedo = false;
        saveState();
      }

      function redo() {
        const file = getActiveFile();
        if (!file || !history[file.id] || !history[file.id].redo.length) return;
        history[file.id].undo.push(file.code);
        file.code = history[file.id].redo.pop();
        isUndoRedo = true;
        codeEditor.value = file.code;
        isUndoRedo = false;
        saveState();
      }

      function updateCursor() {
        const pos = codeEditor.selectionStart;
        const lines = codeEditor.value.slice(0, pos).split('\n');
        cursorPos.textContent = 'Ln ' + lines.length + ', Col ' + (lines[lines.length - 1].length + 1);
      }

      function changeLanguage() {
        const file = getActiveFile();
        if (!file) return;
        file.language = langSelect.value;
        saveState();
        renderFiles();
        statusFile.textContent = file.name + ' [' + file.language + ']';
      }

      async function runActive() {
        const file = getActiveFile();
        if (!file) return;
        flushCurrentFile();
        runOutput.textContent = 'Running ' + file.name + '...';

        try {
          const res = await fetch('/api/sandbox/run', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ language:file.language, code:file.code })
          });

          if (!res.ok) {
            const text = await res.text();
            runOutput.textContent = 'Run failed: ' + res.status + '\n' + text;
            return;
          }

          const data = await res.json();
          runOutput.textContent = 'exit=' + data.code + '\nstdout:\n' + (data.stdout||'') + '\nstderr:\n' + (data.stderr||'');
        } catch (err) {
          runOutput.textContent = 'Run error: ' + err.message;
        }
      }

      async function runAll() {
        flushCurrentFile();
        runOutput.textContent = 'Running all files in chain...';

        const steps = state.files.map(f => ({ language:f.language, code:f.code, fileName:f.name }));

        const popup = window.open('', '_blank', 'width=840,height=620,resizable=yes,scrollbars=yes');
        if (!popup) { alert('Allow popups.'); return; }

        popup.document.write('<!doctype html><html><head><title>Run output</title><style>body{background:#111;color:#e6e6e6;font-family:monospace; padding:8px;}#out{white-space:pre-wrap;}</style></head><body><h3>Run Log</h3><div id="out">Starting...</div></body></html>');
        popup.document.close();

        try {
          const response = await fetch('/api/sandbox/run/chain', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ steps }) });
          if (!response.ok) {
            const text = await response.text();
            popup.document.getElementById('out').textContent = 'Error: ' + text;
            return;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder('utf-8');
          let buffer = '';

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream:true });
            let cut;
            while ((cut = buffer.indexOf('\n\n')) !== -1) {
              const chunk = buffer.slice(0, cut).trim();
              buffer = buffer.slice(cut + 2);
              if (!chunk) continue;
              const lines = chunk.split('\n');
              let event = 'message';
              let data = '';
              for (const line of lines) {
                if (line.startsWith('event:')) event = line.slice(6).trim();
                if (line.startsWith('data:')) data = line.slice(5).trim();
              }
              if (!data) continue;
              try {
                const parsed = JSON.parse(data);
                const out = popup.document.getElementById('out');
                if (event === 'chunk') out.textContent += parsed.text || '';
                else if (event === 'step-start') out.textContent += '\n\n=== ' + (parsed.label || parsed.language) + ' started\n';
                else if (event === 'step-done') out.textContent += '\n--- ' + (parsed.label || parsed.language) + ' exit ' + parsed.exitCode + ' \n';
                else if (event === 'done') out.textContent += '\n=== chain completed\n';
              } catch (err) { console.warn('parse event', err); }
            }
          }
          runOutput.textContent = 'Run chain complete (see popup window).';
        } catch (err) {
          runOutput.textContent = 'Run error: ' + err.message;
          if (popup && !popup.closed) popup.document.getElementById('out').textContent = 'Error: ' + err.message;
        }
      }

      function confirmNewFile(name) {
        if (!name || !name.trim()) {
          // Remove temp file if empty
          state.files = state.files.filter(f => f.id !== 'temp-new');
          renderFiles();
          return;
        }
        const trimmed = name.trim();
        const ext = trimmed.split('.').pop().toLowerCase();
        if (!['html', 'css', 'js'].includes(ext)) {
          alert('File must have .html, .css, or .js extension');
          return;
        }
        const lang = ext === 'js' ? 'nodejs' : ext;
        const template = TEMPLATES[lang] || '';
        // Remove temp file and create real one
        state.files = state.files.filter(f => f.id !== 'temp-new');
        createFile(trimmed, lang, template);
      }

      // Button handlers
      document.getElementById('newFileBtn').onclick = () => {
        // Create temp file for inline naming
        state.files.push({ id: 'temp-new', name: '', language: 'html', code: '' });
        renderFiles();
        // Focus the input
        const input = fileListEl.querySelector('input');
        if (input) input.focus();
      };

      document.getElementById('importFileBtn').onclick = () => fileUpload.click();

      document.getElementById('saveFileBtn').onclick = () => {
        flushCurrentFile();
        saveState();
        runOutput.textContent = 'Saved';
      };

      document.getElementById('downloadFileBtn').onclick = () => {
        const file = getActiveFile();
        if (!file) return;
        const blob = new Blob([file.code], { type:'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = file.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      document.getElementById('runActiveBtn').onclick = runActive;
      document.getElementById('runAllBtn').onclick = runAll;
      document.getElementById('undoBtn').onclick = undo;
      document.getElementById('redoBtn').onclick = redo;

      langSelect.onchange = changeLanguage;

      codeEditor.addEventListener('input', () => {
        if (!state.activeId) return;
        const file = getActiveFile();
        if (!file) return;
        if (!isUndoRedo) {
          history[file.id].undo.push(file.code);
          history[file.id].redo = [];
        }
        file.code = codeEditor.value;
        saveState();
      });

      codeEditor.addEventListener('keydown', (e) => {
        if (e.ctrlKey && (e.key === 's' || e.key === 'S')) {
          e.preventDefault();
          flushCurrentFile();
          saveState();
          runOutput.textContent = 'Saved';
        }
        if (e.ctrlKey && e.key.toLowerCase() === 'z') {
          e.preventDefault();
          undo();
        }
        if (e.ctrlKey && e.key.toLowerCase() === 'y') {
          e.preventDefault();
          redo();
        }
      });

      codeEditor.addEventListener('click', updateCursor);
      codeEditor.addEventListener('keyup', updateCursor);

      fileUpload.addEventListener('change', (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const ext = (file.name.split('.').pop() || '').toLowerCase();
          const mapLang = { js:'nodejs', py:'python', rs:'rust', c:'c', cpp:'cpp', cs:'csharp' };
          createFile(file.name, mapLang[ext] || 'nodejs', String(reader.result || ''));
          event.target.value = '';
        };
        reader.readAsText(file);
      });

      // Initialize app
      loadState();
      renderFiles();
      renderAgents();
      if (state.activeId) selectFile(state.activeId);
    </script>
  </body>
</html>
