
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iTECify IDE</title>
    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.min.js"></script>
    <script>
      var require = { paths: { 'vs': 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } };
    </script>
    <script src="https://unpkg.com/y-monaco@0.1.0/dist/y-monaco.js"></script>
    <script src="https://unpkg.com/yjs@13.6.8/dist/yjs.js"></script>
    <script src="https://unpkg.com/y-websocket@1.5.0/dist/y-websocket.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Segoe UI, Roboto, Arial, sans-serif; background: #1e1e1e; color: #cccccc; }

      .app {
        height: 100vh;
        display: grid;
        grid-template-columns: 48px 260px 1fr;
        grid-template-rows: 34px 1fr 240px;
        grid-template-areas:
          "title title title"
          "activity sidebar editor"
          "activity sidebar terminal";
      }

      .titlebar {
        grid-area: title;
        display: flex;
        align-items: center;
        padding: 0 12px;
        background: #323233;
        border-bottom: 1px solid #2a2a2a;
        color: #e6e6e6;
        font-size: 12px;
      }

      .activity {
        grid-area: activity;
        background: #333333;
        border-right: 1px solid #2a2a2a;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding-top: 8px;
      }
      .activity .dot {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        border: 1px solid #4a4a4a;
        background: #2a2a2a;
      }

      .sidebar {
        grid-area: sidebar;
        background: #252526;
        border-right: 1px solid #2a2a2a;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #9d9d9d; padding: 10px 12px; }
      .file {
        width: 100%;
        border: 0;
        text-align: left;
        background: transparent;
        color: #cccccc;
        padding: 7px 12px;
        cursor: pointer;
        font-size: 13px;
      }
      .file.active { background: #37373d; }
      .file:hover { background: #4a4a4a; }

      .editor { grid-area: editor; display: flex; flex-direction: column; min-width: 0; background: #1e1e1e; }
      .tabbar { height: 36px; background: #2d2d2d; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; }
      .tab { padding: 8px 12px; font-size: 12px; border-right: 1px solid #2a2a2a; background: #1e1e1e; color: #fff; }

      .editorWrap { position: relative; flex: 1; min-height: 0; }
      #editor { height: 100%; }

      .blocksPanel { border-top: 1px solid #2a2a2a; background: #202020; padding: 10px; max-height: 220px; overflow: auto; }
      .blocksTitle { font-size: 12px; color: #9d9d9d; margin-bottom: 8px; }
      .blockCard { border: 1px solid #2a2a2a; background: #1a1a1a; border-radius: 8px; padding: 8px; margin-bottom: 10px; }
      .blockHead { display: flex; align-items: center; gap: 8px; }
      .blockHead .meta { font-size: 12px; color: #ddd; }
      .blockHead select { padding: 4px 6px; font-size: 12px; }
      .blockHead button { padding: 4px 8px; font-size: 12px; cursor: pointer; }
      .blockContent {
        margin-top: 8px;
        width: 100%;
        min-height: 90px;
        background: #141414;
        color: #d4d4d4;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 8px;
        font-family: Consolas, Monaco, monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .terminal { grid-area: terminal; display: flex; flex-direction: column; border-top: 1px solid #2a2a2a; background: #181818; }
      .term-head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid #2a2a2a;
        background: #1f1f1f;
      }
      .status { margin-left: auto; font-size: 12px; color: #9d9d9d; }
      button, select { background: #2f2f2f; color: #dddddd; border: 1px solid #4a4a4a; border-radius: 4px; padding: 5px 8px; font-size: 12px; }
      button:hover { background: #4a4a4a; }
      .checks { display: flex; gap: 8px; flex-wrap: wrap; }
      .checks label { font-size: 12px; color: #c8c8c8; }

      #terminalOut { flex: 1; margin: 0; padding: 10px; overflow: auto; white-space: pre-wrap; font-family: Consolas, Monaco, monospace; font-size: 12px; color: #d4d4d4; }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="titlebar">iTECify IDE</div>

      <aside class="activity">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </aside>

      <aside class="sidebar">
        <div class="section-title">Explorer</div>
        <div id="files"></div>
        <button id="addFile">Add File</button>
        <input id="fileInput" type="file" multiple style="display:none">
      </aside>

      <section class="editor">
        <div class="tabbar"><div class="tab" id="activeTab">—</div></div>
        <div class="editorWrap">
          <div id="editor"></div>
        </div>

        <div class="blocksPanel">
          <div class="blocksTitle">AI Blocks (editable, accept/reject)</div>
          <div id="blocks"></div>
        </div>
      </section>

      <section class="terminal">
        <div class="term-head">
          <strong style="font-size: 12px;">TERMINAL</strong>
          <button id="runChain">Run Selected</button>
          <button id="stopBtn" disabled>Stop</button>
          <button id="clearTerminal">Clear</button>
          <select id="timeoutMs">
            <option value="30000">30s</option>
            <option value="10000">10s</option>
            <option value="60000">60s</option>
          </select>
          <div class="checks">
            <label><input type="checkbox" data-lang="nodejs" checked />js</label>
            <label><input type="checkbox" data-lang="python" checked />py</label>
          </div>
          <span class="status" id="status">idle</span>
        </div>
        <pre id="terminalOut"></pre>
      </section>
    </div>

    <script type="module">
      const Y = window.Y;
      const { WebsocketProvider } = window;

      const MonacoBinding = window.MonacoBinding;

      const editorContainer = document.getElementById("editor");
      const filesEl = document.getElementById("files");
      const blocksEl = document.getElementById("blocks");
      const activeTabEl = document.getElementById("activeTab");

      const outEl = document.getElementById("terminalOut");
      const statusEl = document.getElementById("status");
      const stopBtn = document.getElementById("stopBtn");

      function setStatus(v) { statusEl.textContent = v; }
      function appendOut(text) { outEl.textContent += text; outEl.scrollTop = outEl.scrollHeight; }

      const FILES = [
        { id: "nodejs", name: "main.js", language: "nodejs" },
        { id: "python", name: "main.py", language: "python" },
      ];

      const SNIPPETS = {
        nodejs: 'console.log("nodejs: hello");\n',
        python: 'print("python: hello")\n',
      };

      let activeId = "nodejs";
      let controller = null;
      let editor;
      let models = {};
      let binding;

      let pyodide;
      let outputBuffer = "";
      const originalConsoleLog = console.log;
      console.log = (...args) => {
        outputBuffer += args.join(" ") + "\n";
        originalConsoleLog(...args);
      };

      // Wait for Monaco
      await new Promise((resolve) => {
        require(['vs/editor/editor.main'], function() {
          window.monaco = monaco;
          resolve();
        });
      });

      // Create models
      for (const f of FILES) {
        models[f.id] = monaco.editor.createModel(SNIPPETS[f.id], f.language);
      }

      // Create editor
      editor = monaco.editor.create(editorContainer, {
        model: models[activeId],
        theme: 'vs-dark',
        fontSize: 13,
        lineHeight: 21,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        automaticLayout: true,
        wordWrap: 'off',
        renderWhitespace: 'selection',
        bracketMatching: 'always',
      });

      // Load Pyodide
      pyodide = await loadPyodide();
      pyodide.runPython("import sys\nfrom io import StringIO\nsys.stdout = StringIO()");

      const room = new URLSearchParams(location.search).get("room") || "default-room";
      const wsHost = location.hostname || "localhost";
      const providerUrl = `ws://${wsHost}:1234`;

      const myName = "user-" + Math.floor(Math.random() * 10000);
      const myColor = "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0");

      const doc = new Y.Doc();
      const provider = new WebsocketProvider(providerUrl, room, doc);
      const awareness = provider.awareness;

      const ytexts = new Map();
      for (const f of FILES) ytexts.set(f.id, doc.getText(f.id));

      const initMap = doc.getMap("init");
      if (!initMap.get("seeded")) {
        initMap.set("seeded", true);
        for (const f of FILES) {
          const t = ytexts.get(f.id);
          if (t.length === 0) t.insert(0, SNIPPETS[f.id] || "");
        }
      }

      // Binding
      binding = new MonacoBinding(ytexts.get(activeId), models[activeId], new Set([editor]), awareness);

      // Cursor tracking
      editor.onDidChangeCursorPosition(() => {
        const position = editor.getPosition();
        const x = position.column * 8.4;
        const y = position.lineNumber * 21;
        awareness.setLocalStateField("cursor", { position: { x, y }, file: activeId });
        awareness.setLocalStateField("activeFile", activeId);
        awareness.setLocalStateField("user", { name: myName, color: myColor });
      });

      function blockHeader(id, lang, status) {
        return `//__AI_BLOCK_START__:${id}:${lang}:${status}`;
      }

      function updateEditorCode(newCode) {
        const t = ytexts.get(activeId);
        t.doc.transact(() => {
          t.delete(0, t.length);
          t.insert(0, newCode);
        });
      }

      // Explorer UI
      for (const f of FILES) {
        const btn = document.createElement("button");
        btn.className = "file" + (f.id === activeId ? " active" : "");
        btn.textContent = f.name;
        btn.onclick = () => {
          activeId = f.id;
          editor.setModel(models[activeId]);
          binding.destroy();
          binding = new MonacoBinding(ytexts.get(activeId), models[activeId], new Set([editor]), awareness);
          activeTabEl.textContent = f.name;
          renderBlocks();
          renderExplorer();
        };
        filesEl.appendChild(btn);
      }

      function renderExplorer() {
        for (const btn of Array.from(filesEl.querySelectorAll("button.file"))) {
          const id = FILES.find((x) => x.name === btn.textContent)?.id;
          btn.classList.toggle("active", id === activeId);
        }
      }

      // Add File
      document.getElementById("addFile").onclick = () => {
        console.log("Add File clicked");
        document.getElementById("fileInput").click();
      };

      document.getElementById("fileInput").onchange = (e) => {
        for (const file of e.target.files) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const content = event.target.result;
            const name = file.name;
            const ext = name.split('.').pop().toLowerCase();
            let language = "plaintext";
            if (ext === "js") language = "javascript";
            else if (ext === "py") language = "python";
            const id = name.replace(/[^a-zA-Z0-9]/g, "_");
            if (FILES.find(f => f.id === id)) {
              appendOut(`File ${name} already exists\n`);
              return;
            }
            FILES.push({ id, name, language });
            models[id] = monaco.editor.createModel(content, language);
            ytexts.set(id, doc.getText(id));
            ytexts.get(id).insert(0, content);
            // add button
            const btn = document.createElement("button");
            btn.className = "file";
            btn.textContent = name;
            btn.onclick = () => {
              activeId = id;
              editor.setModel(models[id]);
              binding.destroy();
              binding = new MonacoBinding(ytexts.get(id), models[id], new Set([editor]), awareness);
              activeTabEl.textContent = name;
              renderBlocks();
              renderExplorer();
            };
            filesEl.appendChild(btn);
          };
          reader.readAsText(file);
        }
      };

      // runCode
      async function runCode(language, code, timeoutMs) {
        outputBuffer = "";
        try {
          if (language === "nodejs" || language === "javascript") {
            await Promise.race([
              new Promise((resolve) => {
                eval(code);
                resolve();
              }),
              new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), timeoutMs))
            ]);
            return outputBuffer;
          } else if (language === "python") {
            pyodide.runPython("sys.stdout.seek(0); sys.stdout.truncate(0)");
            await Promise.race([
              new Promise((resolve) => {
                pyodide.runPython(code);
                resolve();
              }),
              new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), timeoutMs))
            ]);
            return pyodide.runPython("sys.stdout.getvalue()");
          } else {
            return `Execution not supported for ${language}`;
          }
        } catch (e) {
          return e.message;
        }
      }

      activeTabEl.textContent = FILES.find((x) => x.id === activeId).name;
      editorEl.value = ytexts.get(activeId).toString();
      renderBlocks();

      // ----------------------------
      // Block markers + editable panel
      // ----------------------------
      const START_PREFIX = "//__AI_BLOCK_START__:";
      const END_PREFIX = "//__AI_BLOCK_END__:";

      function parseBlocks(code) {
        const blocks = [];
        let idx = 0;
        while (idx < code.length) {
          const startPos = code.indexOf(START_PREFIX, idx);
          if (startPos === -1) break;

          const lineEnd = code.indexOf("\n", startPos);
          if (lineEnd === -1) break;

          const headerLine = code.slice(startPos, lineEnd).trim();
          const parts = headerLine.split(":");
          if (parts.length < 5) { idx = lineEnd + 1; continue; }

          const id = parts[1];
          const lang = parts[2];
          const status = parts[3] || "pending";

          const endMarker = `${END_PREFIX}${id}`;
          const contentStart = lineEnd + 1;
          const endPos = code.indexOf(endMarker, contentStart);
          if (endPos === -1) break;

          const endLineStart = endPos;
          const endLineEnd = (() => {
            const nl = code.indexOf("\n", endLineStart);
            return nl === -1 ? endLineStart + endMarker.length : nl + 1;
          })();

          const content = code.slice(contentStart, endLineStart);

          blocks.push({
            id,
            lang,
            status,
            startLineStart: startPos,
            startLineEnd: lineEnd + 1,
            contentStart,
            contentEnd: endLineStart,
            endLineEnd,
            content,
          });

          idx = endLineEnd;
        }
        return blocks;
      }

      function renderBlocks() {
        const code = models[activeId].getValue();
        const blocks = parseBlocks(code);
        blocksEl.innerHTML = "";

        if (blocks.length === 0) {
          blocksEl.innerHTML = `<div style="color:#9d9d9d;font-size:12px;">No blocks detected.</div>`;
          return;
        }

        for (const b of blocks) {
          const card = document.createElement("div");
          card.className = "blockCard";

          const head = document.createElement("div");
          head.className = "blockHead";

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `${b.lang} • ${b.id}`;

          const select = document.createElement("select");
          for (const s of ["pending", "accepted", "rejected"]) {
            const opt = document.createElement("option");
            opt.value = s;
            opt.textContent = s;
            if (s === b.status) opt.selected = true;
            select.appendChild(opt);
          }

          const delBtn = document.createElement("button");
          delBtn.textContent = "Reject+remove";

          const applyStatus = (status) => {
            const newHeader = `${blockHeader(b.id, b.lang, status)}\n`;
            const before = code.slice(0, b.startLineStart);
            const after = code.slice(b.startLineEnd);
            updateEditorCode(before + newHeader + after);
            renderBlocks();
          };

          select.onchange = () => applyStatus(select.value);
          delBtn.onclick = () => {
            const before = code.slice(0, b.startLineStart);
            const after = code.slice(b.endLineEnd);
            updateEditorCode(before + after);
            renderBlocks();
          };

          head.appendChild(meta);
          head.appendChild(select);
          head.appendChild(delBtn);

          const contentArea = document.createElement("textarea");
          contentArea.className = "blockContent";
          contentArea.value = b.content;
          contentArea.onblur = () => {
            const newContent = contentArea.value;
            const before = code.slice(0, b.contentStart);
            const after = code.slice(b.contentEnd);
            updateEditorCode(before + newContent + after);
            renderBlocks();
          };

          card.appendChild(head);
          card.appendChild(contentArea);
          blocksEl.appendChild(card);
        }
      }

      function insertBlockForActiveFile() {
        const code = models[activeId].getValue();
        const selection = editor.getSelection();
        const start = models[activeId].getOffsetAt(selection.getStartPosition());
        const end = models[activeId].getOffsetAt(selection.getEndPosition());
        if (start === end) {
          appendOut("\n[insertBlock] Select some text first.\n");
          return;
        }

        const selected = code.slice(start, end);
        const id = "b" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        const lang = activeId;
        const status = "pending";

        const startLine = `${blockHeader(id, lang, status)}\n`;
        const endLine = `${END_PREFIX}${id}\n`;

        const before = code.slice(0, start);
        const after = code.slice(end);
        updateEditorCode(before + startLine + selected + "\n" + endLine + after);
        renderBlocks();
      }

      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key === "Enter") {
          e.preventDefault();
          insertBlockForActiveFile();
        }
      });

      // ----------------------------
      // Terminal: run selected languages in one shared stream
      // ----------------------------
      function parseSSEChunk(raw, onEvent) {
        const blocks = raw.split("\n\n");
        for (const b of blocks) {
          if (!b.trim()) continue;
          const lines = b.split("\n");
          let ev = "message";
          let data = "";
          for (const line of lines) {
            if (line.startsWith("event:")) ev = line.slice(6).trim();
            if (line.startsWith("data:")) data = line.slice(5).trim();
          }
          if (!data) continue;
          onEvent(ev, JSON.parse(data));
        }
      }

      function getCodeForLanguage(lang) {
        const t = ytexts.get(lang);
        return t ? t.toString() : "";
      }

      async function runChain() {
        const selected = Array.from(document.querySelectorAll("input[type=checkbox][data-lang]:checked"))
          .map((el) => el.getAttribute("data-lang"));

        if (!selected.length) {
          appendOut("[select at least one language]\n");
          return;
        }

        setStatus("running");
        stopBtn.disabled = false;
        controller = new AbortController();
        appendOut("\n$ running: " + selected.join(" ") + "\n");

        const timeoutMs = Number(document.getElementById("timeoutMs").value);

        for (const lang of selected) {
          if (controller.signal.aborted) break;
          appendOut(`\n# [${lang}] start\n`);
          try {
            const code = getCodeForLanguage(lang);
            const output = await runCode(lang, code, timeoutMs);
            appendOut(output);
            appendOut(`\n# [${lang}] done\n`);
          } catch (e) {
            appendOut(`\n! [${lang}] ${e.message}\n`);
          }
        }

        appendOut("\n$ done\n");
        setStatus("idle");
        stopBtn.disabled = true;
        controller = null;
      }

      document.getElementById("runChain").onclick = runChain;
      stopBtn.onclick = () => controller && controller.abort();
      document.getElementById("clearTerminal").onclick = () => { outEl.textContent = ""; };
    </script>
  </body>
</html>
